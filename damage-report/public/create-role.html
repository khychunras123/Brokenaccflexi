<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Role - AppFlow</title>
    <!-- Tailwind & React CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Suwannaphum:wght@400;700;900&family=Moul&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        :root {
            --bg-color: #0B0E11;
            --surface-color: #181A20;
            --accent-color: #FCD535;
            --accent-hover: #F0B90B;
            --text-secondary: #848E9C;
        }

        body {
            background-color: var(--bg-color);
            color: #EAECEF;
            font-family: 'Khmer OS Siemreap', 'Inter', sans-serif;
        }

        input, textarea {
            background: rgba(0,0,0,0.25) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: white !important;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            border-color: var(--accent-color) !important;
            outline: none;
        }

        .access-option {
            background: rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
        }

        .access-option.active {
            border-color: var(--accent-color);
            background: rgba(252, 213, 53, 0.1);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const CreateRole = () => {
            const [formData, setFormData] = useState({
                roleName: '',
                accessLevels: [],
                loginName: '',
                password: '',
                confirmPassword: ''
            });
            const [roles, setRoles] = useState([]);
            const [status, setStatus] = useState({ type: '', message: '' });
            const [isLoading, setIsLoading] = useState(false);
            const [currentUserRole, setCurrentUserRole] = useState(localStorage.getItem('userRole') || '');

            // Admin Guard: Redirect if not admin
            useEffect(() => {
                if (!currentUserRole) {
                    window.location.replace('login.html');
                } else if (currentUserRole !== 'Admin') {
                    window.location.replace('dashboard_one.html');
                } else {
                    fetchRoles();
                }
            }, [currentUserRole]);

            const fetchRoles = async () => {
                try {
                    const response = await fetch('/api/roles');
                    const data = await response.json();
                    if (response.ok) setRoles(data);
                } catch (err) {
                    console.error('Failed to fetch roles:', err);
                }
            };

            const handleLevelToggle = (level) => {
                setFormData(prev => ({
                    ...prev,
                    accessLevels: prev.accessLevels.includes(level)
                        ? prev.accessLevels.filter(l => l !== level)
                        : [...prev.accessLevels, level]
                }));
            };

            const clearForm = () => {
                setFormData({
                    roleName: '',
                    accessLevels: [],
                    loginName: '',
                    password: '',
                    confirmPassword: ''
                });
                setStatus({ type: '', message: '' });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (formData.accessLevels.length === 0) {
                    setStatus({ type: 'error', message: 'Please select at least one access level.' });
                    return;
                }
                if (formData.password !== formData.confirmPassword) {
                    setStatus({ type: 'error', message: 'Passwords do not match.' });
                    return;
                }

                setIsLoading(true);
                setStatus({ type: '', message: '' });

                try {
                    const { confirmPassword, ...submitData } = formData;
                    const response = await fetch('/api/roles', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(submitData)
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || 'Failed to create role');
                    }

                    setStatus({ type: 'success', message: 'Role created successfully!' });
                    fetchRoles(); // Refresh the list
                    setTimeout(clearForm, 2000);
                } catch (err) {
                    setStatus({ type: 'error', message: err.message });
                } finally {
                    setIsLoading(false);
                }
            };

            if (currentUserRole !== 'Admin') return null; // Prevent flicker during redirect

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Topbar */}
                    <header className="h-[70px] flex items-center justify-between px-[30px] bg-[#181A20] border-b border-[#FCD535]/30 sticky top-0 z-50">
                        <div className="flex items-center gap-2.5 text-[#FCD535] font-extrabold text-[1.2rem]">
                            <i className="fa-solid fa-user-shield"></i>
                            Create Role
                        </div>
                        <a href="dashboard_one.html" className="inline-flex items-center gap-2 px-3.5 py-2.5 rounded-lg bg-white/5 border border-white/10 font-bold text-sm text-[#EAECEF] no-underline hover:bg-white/10 transition-colors">
                            <i className="fa-solid fa-arrow-left"></i>
                            Dashboard
                        </a>
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 p-6 md:p-8">
                        <div className="max-w-[960px] mx-auto space-y-8">
                            {/* Create Form Panel */}
                            <div className="bg-[#181A20] border border-white/10 rounded-xl overflow-hidden shadow-2xl">
                                <div className="px-6 py-5 border-b border-white/10 flex justify-between items-center">
                                    <h1 className="text-[1.35rem] font-bold text-[#FCD535]">Create New Role</h1>
                                    <span className="text-[#848E9C] text-sm font-bold">Admin Only Access</span>
                                </div>

                                <form onSubmit={handleSubmit} className="p-6 grid grid-cols-1 md:grid-cols-2 gap-5">
                                    <div className="flex flex-col gap-2">
                                        <label className="text-[#848E9C] text-sm font-bold">Role Name</label>
                                        <input 
                                            type="text" 
                                            placeholder="Example: Store Manager"
                                            className="p-3 rounded-lg w-full"
                                            value={formData.roleName}
                                            onChange={e => setFormData({...formData, roleName: e.target.value})}
                                            required
                                        />
                                    </div>

                                    <div className="flex flex-col gap-2">
                                        <label className="text-[#848E9C] text-sm font-bold">Access Level</label>
                                        <div className="grid grid-cols-3 gap-2">
                                            {['User', 'Processing', 'View Only'].map(level => (
                                                <label 
                                                    key={level}
                                                    className={`flex items-center gap-2 p-3 rounded-lg cursor-pointer font-bold text-xs md:text-sm access-option ${formData.accessLevels.includes(level) ? 'active' : ''}`}
                                                >
                                                    <input 
                                                        type="checkbox"
                                                        className="w-4 h-4 accent-[#FCD535]"
                                                        checked={formData.accessLevels.includes(level)}
                                                        onChange={() => handleLevelToggle(level)}
                                                    />
                                                    {level}
                                                </label>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="flex flex-col gap-2">
                                        <label className="text-[#848E9C] text-sm font-bold">Login Name</label>
                                        <input 
                                            type="text" 
                                            placeholder="Example: manager"
                                            className="p-3 rounded-lg w-full"
                                            value={formData.loginName}
                                            onChange={e => setFormData({...formData, loginName: e.target.value})}
                                            required
                                        />
                                    </div>

                                    <div className="flex flex-col gap-2">
                                        <label className="text-[#848E9C] text-sm font-bold">Password</label>
                                        <input 
                                            type="password" 
                                            placeholder="Create password"
                                            className="p-3 rounded-lg w-full"
                                            value={formData.password}
                                            onChange={e => setFormData({...formData, password: e.target.value})}
                                            required
                                        />
                                    </div>

                                    <div className="flex flex-col gap-2">
                                        <label className="text-[#848E9C] text-sm font-bold">Confirm Password</label>
                                        <input 
                                            type="password" 
                                            placeholder="Repeat password"
                                            className="p-3 rounded-lg w-full"
                                            value={formData.confirmPassword}
                                            onChange={e => setFormData({...formData, confirmPassword: e.target.value})}
                                            required
                                        />
                                    </div>

                                    {status.message && (
                                        <div className={`md:col-span-2 font-bold ${status.type === 'success' ? 'text-[#00c77e]' : 'text-red-500'}`}>
                                            {status.message}
                                        </div>
                                    )}

                                    <div className="md:col-span-2 flex justify-end gap-3 mt-2">
                                        <button 
                                            type="button" 
                                            onClick={clearForm}
                                            className="px-6 py-3 rounded-lg bg-white/5 text-[#EAECEF] font-bold hover:bg-white/10 transition-all"
                                        >
                                            Clear
                                        </button>
                                        <button 
                                            type="submit"
                                            disabled={isLoading}
                                            className="px-8 py-3 rounded-lg bg-[#FCD535] text-[#0B0E11] font-extrabold flex items-center gap-2 hover:bg-[#F0B90B] disabled:opacity-50 transition-all shadow-lg"
                                        >
                                            {isLoading ? <i className="fa-solid fa-circle-notch fa-spin"></i> : <i className="fa-solid fa-plus"></i>}
                                            {isLoading ? 'Creating...' : 'Create Role'}
                                        </button>
                                    </div>
                                </form>
                            </div>

                            {/* Role Management Panel (Admin Only) */}
                            <div className="bg-[#181A20] border border-white/10 rounded-xl overflow-hidden shadow-2xl">
                                <div className="px-6 py-5 border-b border-white/10">
                                    <h2 className="text-[1.1rem] font-bold text-[#FCD535]">Role Management (Admin Only)</h2>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-black/20 text-[#848E9C] text-xs font-bold uppercase tracking-wider">
                                                <th className="px-6 py-4 border-b border-white/5">Role Name</th>
                                                <th className="px-6 py-4 border-b border-white/5">Login Name</th>
                                                <th className="px-6 py-4 border-b border-white/5">Password</th>
                                                <th className="px-6 py-4 border-b border-white/5">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-white/5">
                                            {roles.length === 0 ? (
                                                <tr>
                                                    <td colSpan="4" className="px-6 py-10 text-center text-[#848E9C]">No roles found.</td>
                                                </tr>
                                            ) : (
                                                roles.map((role) => (
                                                    <tr key={role._id} className="hover:bg-white/5 transition-colors group">
                                                        <td className="px-6 py-4 font-bold text-[#EAECEF]">{role.roleName}</td>
                                                        <td className="px-6 py-4 text-[#848E9C] font-mono">{role.loginName}</td>
                                                        <td className="px-6 py-4">
                                                            <div className="flex items-center gap-2">
                                                                <span className="text-[#848E9C] tracking-[0.2em] font-bold">••••••••</span>
                                                                <span className="text-[10px] bg-[#00c77e]/10 text-[#00c77e] px-2 py-1 rounded-full font-extrabold uppercase">Hashed</span>
                                                            </div>
                                                        </td>
                                                        <td className="px-6 py-4">
                                                            <span className="inline-flex items-center gap-1.5 text-[#00c77e] text-xs font-bold bg-[#00c77e]/10 px-3 py-1.5 rounded-lg border border-[#00c77e]/20">
                                                                <div className="w-1.5 h-1.5 rounded-full bg-[#00c77e] animate-pulse"></div>
                                                                Active
                                                            </span>
                                                        </td>
                                                    </tr>
                                                ))
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CreateRole />);
    </script>
</body>
</html>
