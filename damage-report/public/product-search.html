<!DOCTYPE html>
<html class="dark" lang="km">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Product Search - Premium Component</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Suwannaphum:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = { 
            darkMode: "class", 
            theme: { 
                extend: { 
                    colors: { 
                        "binance-yellow": "#F3BA2F",
                        "binance-bg": "#0B0E11",
                        "binance-card": "#1E2329",
                        "binance-input": "#2B3139",
                        "binance-border": "#474D57",
                        "binance-text": "#EAECEF",
                        "binance-gray": "#929AA5"
                    },
                    animation: {
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                } 
            } 
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Suwannaphum:wght@400;700;900&family=Moul&display=swap" rel="stylesheet">
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        body { 
            background-color: #0B0E11; 
            color: #EAECEF; 
            min-height: 100vh; 
            font-family: 'Khmer OS Siemreap', 'Manrope', 'Suwannaphum', sans-serif;
        }
        .premium-glass {
            background: rgba(30, 35, 41, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(71, 77, 87, 0.3);
        }
        .premium-input {
            background-color: #1E2329 !important;
            border: 1px solid #474D57 !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .premium-input:focus {
            border-color: #F3BA2F !important;
            box-shadow: 0 0 0 2px rgba(243, 186, 47, 0.1);
            outline: none;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0B0E11;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #474D57;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #F3BA2F;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-down {
            animation: slideDown 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="antialiased p-4 md:p-8">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const formatImageUrl = (url) => {
            if (!url) return null;
            const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
            if (match && match[1]) {
                return 'https://drive.google.com/thumbnail?id=' + match[1] + '&sz=w1000';
            }
            return url;
        };


        const API_URL = '/api/products';
        const API_KEY = 'my-secret-key-ChanRas-123';

        const ProductSearch = () => {
            const [products, setProducts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [isFocused, setIsFocused] = useState(false);
            const dropdownRef = useRef(null);

            useEffect(() => {
                const fetchProducts = async () => {
                    try {
                        setLoading(true);
                        const response = await fetch(API_URL, {
                            headers: { 'Content-Type': 'application/json' }
                        });
                        
                        if (!response.ok) throw new Error('Failed to fetch data');
                        
                        const json = await response.json();
                        if (json.status === 'success') {
                            setProducts(json.data);
                        } else {
                            throw new Error(json.message || 'Unknown error');
                        }
                    } catch (err) {
                        setError(err.message);
                        console.error('API Error:', err);
                    } finally {
                        setLoading(false);
                    }
                };

                fetchProducts();
            }, []);

            const filteredProducts = useMemo(() => {
                if (!searchQuery.trim()) return products.slice(0, 10); // Show top 10 initially
                return products.filter(p => 
                    p.ProductName?.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    p.Barcode?.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    p.Tags?.toLowerCase().includes(searchQuery.toLowerCase())
                );
            }, [products, searchQuery]);

            // Handle clicking outside to close dropdown
            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setIsFocused(false);
                    }
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            return (
                <div className="max-w-xl mx-auto space-y-4" ref={dropdownRef}>
                    <div className="flex items-center justify-between mb-2">
                        <h2 className="text-sm font-bold text-binance-gray uppercase tracking-widest flex items-center gap-2">
                            <span className="material-symbols-outlined text-sm">inventory_2</span>
                            Product Search
                        </h2>
                        {loading && (
                            <div className="flex items-center gap-2 text-[10px] text-binance-yellow animate-pulse">
                                <span className="w-1.5 h-1.5 bg-binance-yellow rounded-full animate-bounce"></span>
                                SYNCING DATA
                            </div>
                        )}
                    </div>

                    <div className="relative group">
                        <div className={`absolute inset-y-0 left-4 flex items-center pointer-events-none transition-colors duration-300 ${isFocused ? 'text-binance-yellow' : 'text-binance-gray'}`}>
                            <span className="material-symbols-outlined">search</span>
                        </div>
                        
                        <input
                            type="text"
                            className="w-full premium-input pl-12 pr-4 py-4 rounded-2xl text-white font-bold placeholder:text-binance-gray/50 placeholder:font-medium"
                            placeholder="Scan barcode or type product name..."
                            value={searchQuery}
                            onChange={(e) => setSearchQuery(e.target.value)}
                            onFocus={() => setIsFocused(true)}
                        />

                        {searchQuery && (
                            <button 
                                onClick={() => setSearchQuery('')}
                                className="absolute inset-y-0 right-4 flex items-center text-binance-gray hover:text-white transition-colors"
                            >
                                <span className="material-symbols-outlined text-xl">close</span>
                            </button>
                        )}
                    </div>

                    {isFocused && (
                        <div className="relative z-50">
                            <div className="absolute top-2 w-full premium-glass rounded-2xl shadow-2xl overflow-hidden border border-binance-border/50 animate-slide-down">
                                <div className="max-h-[400px] overflow-y-auto custom-scrollbar">
                                    {loading ? (
                                        <div className="p-12 text-center space-y-4">
                                            <div className="w-10 h-10 border-2 border-binance-yellow border-t-transparent rounded-full animate-spin mx-auto"></div>
                                            <p className="text-xs font-bold text-binance-gray uppercase tracking-widest">Loading Catalog...</p>
                                        </div>
                                    ) : error ? (
                                        <div className="p-8 text-center space-y-3">
                                            <span className="material-symbols-outlined text-red-500 text-4xl">error</span>
                                            <p className="text-xs font-bold text-red-400">{error}</p>
                                        </div>
                                    ) : filteredProducts.length > 0 ? (
                                        <div className="py-2">
                                            {filteredProducts.map((product, idx) => (
                                                <div 
                                                    key={product.Barcode || idx}
                                                    className="px-4 py-3 hover:bg-binance-yellow/10 cursor-pointer flex items-center gap-4 group/item transition-all"
                                                >
                                                    <div className="w-12 h-12 rounded-xl bg-binance-input border border-binance-border/30 overflow-hidden flex-shrink-0 relative group-hover/item:border-binance-yellow/50 transition-colors">
                                                        {product.ImageURL ? (
                                                            <img src={formatImageUrl(product.ImageURL)} alt="" className="w-full h-full object-cover" />
                                                        ) : (
                                                            <div className="w-full h-full flex items-center justify-center text-binance-gray">
                                                                <span className="material-symbols-outlined">image</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                    <div className="flex-grow min-w-0">
                                                        <h4 className="text-sm font-bold text-white truncate group-hover/item:text-binance-yellow transition-colors">{product.ProductName}</h4>
                                                        <div className="flex items-center gap-2 mt-0.5">
                                                            <span className="text-[10px] font-mono font-medium text-binance-gray bg-binance-bg px-1.5 py-0.5 rounded border border-binance-border/20">
                                                                {product.Barcode}
                                                            </span>
                                                            <span className="text-[10px] font-black text-binance-yellow">
                                                                ${product.Price?.toFixed(2)}
                                                            </span>
                                                        </div>
                                                    </div>
                                                    <div className="opacity-0 group-hover/item:opacity-100 transition-opacity">
                                                        <span className="material-symbols-outlined text-binance-yellow">add_circle</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="p-12 text-center space-y-3">
                                            <span className="material-symbols-outlined text-binance-gray text-4xl">inventory_2</span>
                                            <p className="text-xs font-bold text-binance-gray uppercase tracking-widest">No products found</p>
                                        </div>
                                    )}
                                </div>
                                {filteredProducts.length > 0 && (
                                    <div className="p-3 bg-binance-bg/50 border-t border-binance-border/30 flex justify-between items-center px-4">
                                        <span className="text-[9px] font-bold text-binance-gray uppercase tracking-tighter">
                                            {filteredProducts.length} Results Showing
                                        </span>
                                        <span className="text-[9px] font-bold text-binance-yellow bg-binance-yellow/10 px-2 py-0.5 rounded-full border border-binance-yellow/20">
                                            Production Data
                                        </span>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Quick Stats Overlay (Premium Touch) */}
                    {!isFocused && !searchQuery && (
                        <div className="grid grid-cols-3 gap-3 animate-in fade-in slide-in-from-bottom-2 duration-700">
                            {[
                                { label: 'In Stock', value: products.length, icon: 'check_circle' },
                                { label: 'New Arrival', value: '12', icon: 'new_releases' },
                                { label: 'Fast Moving', value: '05', icon: 'trending_up' }
                            ].map((stat, i) => (
                                <div key={i} className="premium-glass p-3 rounded-2xl border border-white/5 space-y-1 hover:border-binance-yellow/30 transition-colors">
                                    <span className="material-symbols-outlined text-xs text-binance-yellow">{stat.icon}</span>
                                    <div className="text-lg font-bold text-white leading-none">{stat.value}</div>
                                    <div className="text-[9px] font-black text-binance-gray uppercase tracking-wider">{stat.label}</div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            return (
                <div className="min-h-full flex items-center justify-center">
                    <ProductSearch />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
