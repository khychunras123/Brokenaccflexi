<!DOCTYPE html>
<html class="dark" lang="km">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Suwannaphum:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = { 
            darkMode: "class", 
            theme: { 
                extend: { 
                    colors: { 
                        "primary-container": "#f3ba2f",
                        "dark-bg": "#0B0E11",
                        "card-bg": "#111417",
                        "border-color": "#363C4E"
                    } 
                } 
            } 
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Suwannaphum:wght@400;700;900&family=Moul&display=swap" rel="stylesheet">
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #000000; color: #e1e2e7; min-height: 100vh; font-family: 'Khmer OS Siemreap', 'Suwannaphum', 'Manrope', sans-serif; }
        .bn-input {
            background-color: #1E1E1E !important;
            border: 1px solid #363C4E !important;
            color: #EAECEF !important;
            border-radius: 1rem !important;
            padding: 1rem !important;
            transition: all 0.2s ease;
        }
        .bn-input::placeholder {
            color: #9ca3af;
            opacity: 1;
        }
        .bn-input:focus {
            border-color: #f3ba2f;
            outline: none;
            box-shadow: 0 0 0 2px rgba(243, 186, 47, 0.1);
        }
        .hidden { display: none; }
        video { transform: scaleX(-1); } /* Mirror for front camera */
    </style>
</head>
<body class="antialiased flex flex-col items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-black border border-border-color rounded-2xl shadow-2xl p-6 md:p-8">
        <!-- Header -->
        <h2 class="text-2xl font-bold mb-8 text-primary-container flex items-center gap-2">
            <span class="material-symbols-outlined">person</span>
            ជំហានទី ២: ព័ត៌មានអតិថិជន (Step 2: Customer Details)
        </h2>

        <form id="step2Form" class="space-y-6">
            <!-- Inputs -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="flex flex-col gap-3 group">
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-widest group-focus-within:text-primary-container transition-colors">ឈ្មោះភ្ញៀវ (Customer Name)</label>
                    <input type="text" id="customerName" required placeholder="បញ្ចូលឈ្មោះ..." class="bn-input">
                </div>
                <div class="flex flex-col gap-3 group">
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-widest group-focus-within:text-primary-container transition-colors">លេខទូរស័ព្ទភ្ញៀវ (Phone Number)</label>
                    <input type="tel" id="phoneNumber" required placeholder="012 345 678" class="bn-input font-mono">
                </div>
            </div>

            <div class="flex flex-col gap-3 group">
                <label class="text-xs font-bold text-gray-400 uppercase tracking-widest group-focus-within:text-primary-container transition-colors">ថ្ងៃទិញ (Purchase Date)</label>
                <input type="date" id="purchaseDate" required class="bn-input [color-scheme:dark]">
            </div>

            <!-- High-Fidelity Photo Section -->
            <div class="pt-6 pb-2 space-y-6">
                <div class="flex justify-between items-center">
                    <h3 class="text-sm font-bold text-white">រូបថតអតិថិជន (Client Photo)</h3>
                    <span class="text-[10px] text-gray-500 font-medium uppercase tracking-tighter">Optional</span>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button 
                        type="button"
                        id="startCameraBtn"
                        class="bg-[#2B3139] hover:bg-[#363C4E] p-4 rounded-xl flex flex-col items-center justify-center gap-2 transition-all active:scale-95 shadow-lg border border-white/5"
                    >
                        <span class="material-symbols-outlined text-white text-2xl">photo_camera</span>
                        <span class="text-xs font-bold text-white">ថតរូប</span>
                    </button>
                    <label class="bg-[#2B3139] hover:bg-[#363C4E] p-4 rounded-xl flex flex-col items-center justify-center gap-2 cursor-pointer transition-all active:scale-95 shadow-lg border border-white/5">
                        <span class="material-symbols-outlined text-white text-2xl">cloud_upload</span>
                        <span class="text-xs font-bold text-white">បញ្ចូលរូប</span>
                        <input type="file" id="fileInput" class="hidden" accept="image/*" />
                    </label>
                </div>

                <div class="py-4 text-center">
                    <p class="text-sm font-bold text-white leading-relaxed">
                        (ចូលកែរប្រែកន្លែង Client Photo (Optional) មាន icon ថត នឹង Uplord img)
                    </p>
                </div>

                <!-- Preview Area -->
                <div id="previewArea" class="hidden relative rounded-2xl overflow-hidden border border-white/10 shadow-2xl group">
                    <div class="relative aspect-video bg-[#000]">
                        <img id="photoPreview" class="w-full h-full object-cover" alt="Client Preview" />
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                        <div class="absolute bottom-4 left-4 right-4">
                            <p class="text-[10px] font-black text-white uppercase tracking-[0.3em] drop-shadow-lg">Stay Situational Awareness</p>
                        </div>
                    </div>
                    <button 
                        type="button"
                        id="removePhotoBtn"
                        class="absolute top-4 right-4 w-10 h-10 bg-red-600 text-white rounded-full flex items-center justify-center shadow-2xl active:scale-90 transition-transform z-10"
                    >
                        <span class="material-symbols-outlined text-lg font-bold">close</span>
                    </button>
                </div>

                <div id="noImagePlaceholder" class="h-48 rounded-2xl bg-black border border-dashed border-white/10 flex flex-col items-center justify-center opacity-30">
                    <span class="material-symbols-outlined text-4xl mb-2">image_not_supported</span>
                    <p class="text-[10px] font-bold uppercase tracking-widest">No Image Captured</p>
                </div>
            </div>

            <!-- Camera UI (Hidden by default) -->
            <div id="cameraContainer" class="hidden fixed inset-0 z-[200] bg-black flex flex-col">
                <div class="flex-grow relative flex items-center justify-center">
                    <video id="video" class="w-full h-full object-cover max-w-lg" autoplay playsinline></video>
                    <button type="button" id="stopCameraBtn" class="absolute top-6 right-6 w-10 h-10 bg-[#2B3139] rounded-full flex items-center justify-center text-white">
                        <span class="material-symbols-outlined">close</span>
                    </button>
                </div>
                <div class="h-40 bg-[#1E2329] flex items-center justify-center">
                    <button type="button" id="captureBtn" class="w-16 h-16 border-4 border-[#F3BA2F] rounded-full flex items-center justify-center bg-white shadow-xl"></button>
                </div>
            </div>

            <!-- Navigation -->
            <div class="flex justify-between pt-10">
                <button type="button" class="text-gray-400 border border-border-color py-3 px-8 rounded-lg hover:bg-white/5 transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined">arrow_back</span>
                    Back
                </button>
                <button type="submit" class="bg-primary-container text-black font-bold py-3 px-10 rounded-lg hover:bg-yellow-500 transition-all flex items-center gap-2 shadow-lg active:scale-95">
                    Next
                    <span class="material-symbols-outlined">arrow_forward</span>
                </button>
            </div>
        </form>
    </div>

    <script>
        const startCameraBtn = document.getElementById('startCameraBtn');
        const stopCameraBtn = document.getElementById('stopCameraBtn');
        const captureBtn = document.getElementById('captureBtn');
        const cameraContainer = document.getElementById('cameraContainer');
        const video = document.getElementById('video');
        const previewArea = document.getElementById('previewArea');
        const photoPreview = document.getElementById('photoPreview');
        const removePhotoBtn = document.getElementById('removePhotoBtn');
        const fileInput = document.getElementById('fileInput');

        let stream = null;

        // Camera Logic
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
                cameraContainer.classList.remove('hidden');
                previewArea.classList.add('hidden');
            } catch (err) {
                console.error("Error accessing camera:", err);
                alert("Could not access camera. Please ensure you are on HTTPS or localhost and have given permission.");
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            cameraContainer.classList.add('hidden');
        }

        function capturePhoto() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            
            // Mirror flip for captured image if using front camera
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const dataUrl = canvas.toDataURL('image/jpeg');
            showPreview(dataUrl);
            stopCamera();
        }

        function showPreview(dataUrl) {
            photoPreview.src = dataUrl;
            previewArea.classList.remove('hidden');
        }

        // Event Listeners
        startCameraBtn.addEventListener('click', startCamera);
        stopCameraBtn.addEventListener('click', stopCamera);
        captureBtn.addEventListener('click', capturePhoto);
        
        removePhotoBtn.addEventListener('click', () => {
            previewArea.classList.add('hidden');
            photoPreview.src = '';
            fileInput.value = '';
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    showPreview(event.target.result);
                };
                reader.readAsDataURL(file);
            }
        });

        // Form Submit
        document.getElementById('step2Form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Basic Form Validation
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('phoneNumber').value.trim();
            const date = document.getElementById('purchaseDate').value.trim();
            
            if (!name) {
                alert('សូមបញ្ចូលឈ្មោះភ្ញៀវ / Please enter customer name');
                return;
            }
            if (!phone) {
                alert('សូមបញ្ចូលលេខទូរស័ព្ទ / Please enter phone number');
                return;
            }
            // Basic phone regex (digits and spaces, min length 8)
            if (!/^[\d\s\-\+]{8,15}$/.test(phone)) {
                alert('លេខទូរស័ព្ទមិនត្រឹមត្រូវ / Invalid phone format');
                return;
            }
            if (!date) {
                alert('សូមជ្រើសរើសថ្ងៃទិញ / Please select purchase date');
                return;
            }

            const data = {
                name: name,
                phone: phone,
                date: date,
                photo: photoPreview.src
            };
            console.log("Step 2 Data Submitted:", data);
            alert("Step 2 Complete! Check console for data.");
        });
    </script>
</body>
</html>
