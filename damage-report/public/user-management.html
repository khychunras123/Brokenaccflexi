<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - AppFlow</title>
    <!-- Tailwind & React CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Suwannaphum:wght@400;700;900&family=Moul&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        :root {
            --bg-color: #0B0E11;
            --surface-color: #181A20;
            --accent-color: #FCD535;
            --accent-hover: #F0B90B;
            --emerald-green: #10B981;
            --text-secondary: #848E9C;
        }

        body {
            background-color: var(--bg-color);
            color: #EAECEF;
            font-family: 'Khmer OS Siemreap', 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(252, 213, 53, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(252, 213, 53, 0.4); }

        .modal-enter { opacity: 0; transform: scale(0.95); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: all 0.3s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- UI Components ---

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm transition-all">
                    <div className="bg-[#181A20] border border-[#FCD535]/30 w-full max-w-md rounded-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
                        <div className="flex items-center justify-between px-6 py-4 border-b border-white/10 bg-black/20">
                            <h3 className="text-lg font-bold text-[#FCD535]">{title}</h3>
                            <button onClick={onClose} className="text-[#848E9C] hover:text-white transition-colors">
                                <i className="fa-solid fa-xmark text-xl"></i>
                            </button>
                        </div>
                        <div className="p-6">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        const UserManagement = () => {
            const [users, setUsers] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [isEditModalOpen, setIsEditModalOpen] = useState(false);
            const [editingUser, setEditingUser] = useState(null);
            const [showPassword, setShowPassword] = useState(false);
            const [isLoading, setIsLoading] = useState(true);
            const [status, setStatus] = useState({ type: '', message: '' });

            // Form state
            const [formData, setFormData] = useState({
                roleName: '',
                loginName: '',
                password: '',
                accessLevels: []
            });

            useEffect(() => {
                fetchUsers();
            }, []);

            const fetchUsers = async () => {
                try {
                    setIsLoading(true);
                    const response = await fetch('/api/roles');
                    const data = await response.json();
                    setUsers(data);
                } catch (err) {
                    console.error('Fetch error:', err);
                } finally {
                    setIsLoading(false);
                }
            };

            const handleEditClick = (user) => {
                setEditingUser(user);
                const levels = [];
                if (user.isUser) levels.push('User');
                if (user.canProcess) levels.push('Processing');
                if (user.isViewOnly) levels.push('View Only');

                setFormData({
                    roleName: user.roleName,
                    loginName: user.loginName,
                    password: '', // Keep empty unless changing
                    accessLevels: levels
                });
                setIsEditModalOpen(true);
                setShowPassword(false);
            };

            const handleUpdate = async (e) => {
                e.preventDefault();
                setStatus({ type: '', message: '' });

                try {
                    const response = await fetch(`/api/roles/${editingUser._id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });

                    if (!response.ok) throw new Error('Failed to update user');

                    setStatus({ type: 'success', message: 'User updated successfully!' });
                    fetchUsers();
                    setTimeout(() => setIsEditModalOpen(false), 1500);
                } catch (err) {
                    setStatus({ type: 'error', message: err.message });
                }
            };

            const handleDelete = async (id) => {
                if (!confirm('Are you sure you want to delete this user?')) return;
                try {
                    await fetch(`/api/roles/${id}`, { method: 'DELETE' });
                    fetchUsers();
                } catch (err) {
                    alert('Delete failed');
                }
            };

            const filteredUsers = useMemo(() => {
                return users.filter(u => 
                    u.roleName.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    u.loginName.toLowerCase().includes(searchQuery.toLowerCase())
                );
            }, [users, searchQuery]);

            const getInitials = (name) => name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);

            return (
                <div className="min-h-screen bg-[#0B0E11] text-[#EAECEF]">
                    {/* Header Nav */}
                    <nav className="h-[70px] bg-[#181A20] border-b border-[#FCD535]/30 flex items-center justify-between px-8 sticky top-0 z-40">
                        <div className="flex items-center gap-3">
                            <i className="fa-solid fa-users-gear text-[#FCD535] text-2xl"></i>
                            <h1 className="text-xl font-extrabold tracking-tight">USER MANAGEMENT</h1>
                        </div>
                        <a href="dashboard_one.html" className="bg-white/5 hover:bg-white/10 border border-white/10 px-4 py-2 rounded-lg font-bold text-sm transition-all flex items-center gap-2">
                            <i className="fa-solid fa-arrow-left"></i> BACK TO DASHBOARD
                        </a>
                    </nav>

                    <main className="max-w-6xl mx-auto p-6 md:p-10">
                        {/* Control Bar */}
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                            <div className="relative flex-1 max-w-md">
                                <i className="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-[#848E9C]"></i>
                                <input 
                                    type="text" 
                                    placeholder="Search users by name or login..."
                                    className="w-full bg-[#181A20] border border-white/10 rounded-xl py-3 pl-12 pr-4 outline-none focus:border-[#FCD535] transition-all"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                            </div>
                            <div className="flex gap-3">
                                <a href="create-role.html" className="bg-[#FCD535] hover:bg-[#F0B90B] text-[#0B0E11] font-extrabold px-6 py-3 rounded-xl flex items-center gap-2 transition-all shadow-lg shadow-[#FCD535]/10">
                                    <i className="fa-solid fa-plus"></i> ADD NEW ROLE
                                </a>
                            </div>
                        </div>

                        {/* User List Table */}
                        <div className="bg-[#181A20] rounded-2xl border border-white/10 overflow-hidden shadow-2xl">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left">
                                    <thead>
                                        <tr className="bg-black/40 text-[#848E9C] text-xs font-bold uppercase tracking-[0.1em]">
                                            <th className="px-6 py-5">User / Identity</th>
                                            <th className="px-6 py-5">Login ID</th>
                                            <th className="px-6 py-5">Access Levels</th>
                                            <th className="px-6 py-5">Status</th>
                                            <th className="px-6 py-5 text-right">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-white/5">
                                        {isLoading ? (
                                            <tr>
                                                <td colSpan="5" className="px-6 py-20 text-center">
                                                    <i className="fa-solid fa-circle-notch fa-spin text-3xl text-[#FCD535]"></i>
                                                    <p className="mt-4 text-[#848E9C] font-bold">Synchronizing User Data...</p>
                                                </td>
                                            </tr>
                                        ) : filteredUsers.length === 0 ? (
                                            <tr>
                                                <td colSpan="5" className="px-6 py-20 text-center text-[#848E9C]">
                                                    <i className="fa-solid fa-user-slash text-4xl mb-4 opacity-20"></i>
                                                    <p>No users found matching your search.</p>
                                                </td>
                                            </tr>
                                        ) : (
                                            filteredUsers.map((user) => (
                                                <tr key={user._id} className="hover:bg-white/[0.02] transition-colors group">
                                                    <td className="px-6 py-4">
                                                        <div className="flex items-center gap-4">
                                                            <div className="w-10 h-10 rounded-full bg-[#FCD535] text-[#0B0E11] flex items-center justify-center font-bold text-sm ring-2 ring-white/5">
                                                                {getInitials(user.roleName)}
                                                            </div>
                                                            <div>
                                                                <div className="font-bold text-[#EAECEF]">{user.roleName}</div>
                                                                <div className="text-[10px] text-[#848E9C] font-mono">ID: {user._id.slice(-6).toUpperCase()}</div>
                                                            </div>
                                                        </div>
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <span className="bg-white/5 px-2.5 py-1 rounded font-mono text-sm border border-white/5">{user.loginName}</span>
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <div className="flex flex-wrap gap-1.5">
                                                            {user.isUser && <span className="text-[10px] px-2 py-0.5 rounded-full bg-blue-500/10 text-blue-400 border border-blue-500/20 font-bold uppercase">User</span>}
                                                            {user.canProcess && <span className="text-[10px] px-2 py-0.5 rounded-full bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 font-bold uppercase">Processing</span>}
                                                            {user.isViewOnly && <span className="text-[10px] px-2 py-0.5 rounded-full bg-orange-500/10 text-orange-400 border border-orange-500/20 font-bold uppercase">View Only</span>}
                                                        </div>
                                                    </td>
                                                    <td className="px-6 py-4">
                                                        <div className="flex items-center gap-2 text-[#10B981] text-sm font-bold">
                                                            <div className="w-1.5 h-1.5 rounded-full bg-[#10B981] animate-pulse"></div>
                                                            Active
                                                        </div>
                                                    </td>
                                                    <td className="px-6 py-4 text-right">
                                                        <div className="flex justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <button 
                                                                onClick={() => handleEditClick(user)}
                                                                className="w-9 h-9 flex items-center justify-center rounded-lg bg-white/5 hover:bg-[#FCD535] hover:text-[#0B0E11] transition-all"
                                                                title="Edit User"
                                                            >
                                                                <i className="fa-solid fa-pen-to-square"></i>
                                                            </button>
                                                            <button 
                                                                onClick={() => handleDelete(user._id)}
                                                                className="w-9 h-9 flex items-center justify-center rounded-lg bg-white/5 hover:bg-red-500 transition-all text-red-400 hover:text-white"
                                                                title="Delete User"
                                                            >
                                                                <i className="fa-solid fa-trash-can"></i>
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>

                    {/* Edit User Modal */}
                    <Modal 
                        isOpen={isEditModalOpen} 
                        onClose={() => setIsEditModalOpen(false)}
                        title="Edit System Identity"
                    >
                        <form onSubmit={handleUpdate} className="space-y-5">
                            <div className="space-y-2">
                                <label className="text-xs font-bold text-[#848E9C] uppercase tracking-wider">Display Name</label>
                                <input 
                                    type="text" 
                                    className="w-full bg-black/30 border border-white/10 rounded-xl p-3 outline-none focus:border-[#FCD535] transition-all"
                                    value={formData.roleName}
                                    onChange={(e) => setFormData({...formData, roleName: e.target.value})}
                                    required
                                />
                            </div>

                            <div className="space-y-2">
                                <label className="text-xs font-bold text-[#848E9C] uppercase tracking-wider">Login Username</label>
                                <input 
                                    type="text" 
                                    className="w-full bg-black/30 border border-white/10 rounded-xl p-3 outline-none focus:border-[#FCD535] transition-all"
                                    value={formData.loginName}
                                    onChange={(e) => setFormData({...formData, loginName: e.target.value})}
                                    required
                                />
                            </div>

                            <div className="space-y-2">
                                <label className="text-xs font-bold text-[#848E9C] uppercase tracking-wider">Update Password (Optional)</label>
                                <div className="relative">
                                    <input 
                                        type={showPassword ? 'text' : 'password'} 
                                        placeholder="Leave blank to keep current"
                                        className="w-full bg-black/30 border border-white/10 rounded-xl p-3 outline-none focus:border-[#FCD535] transition-all"
                                        value={formData.password}
                                        onChange={(e) => setFormData({...formData, password: e.target.value})}
                                    />
                                    <button 
                                        type="button"
                                        className="absolute right-4 top-1/2 -translate-y-1/2 text-[#848E9C] hover:text-[#FCD535]"
                                        onClick={() => setShowPassword(!showPassword)}
                                    >
                                        <i className={`fa-solid ${showPassword ? 'fa-eye-slash' : 'fa-eye'}`}></i>
                                    </button>
                                </div>
                            </div>

                            <div className="space-y-2">
                                <label className="text-xs font-bold text-[#848E9C] uppercase tracking-wider">Permission Matrix</label>
                                <div className="grid grid-cols-1 gap-2">
                                    {['User', 'Processing', 'View Only'].map(level => (
                                        <label key={level} className={`flex items-center justify-between p-3 rounded-xl border cursor-pointer transition-all ${formData.accessLevels.includes(level) ? 'bg-[#FCD535]/10 border-[#FCD535]/50' : 'bg-black/20 border-white/5'}`}>
                                            <span className={`font-bold text-sm ${formData.accessLevels.includes(level) ? 'text-[#FCD535]' : 'text-[#848E9C]'}`}>{level} Access</span>
                                            <input 
                                                type="checkbox"
                                                className="w-5 h-5 accent-[#FCD535]"
                                                checked={formData.accessLevels.includes(level)}
                                                onChange={() => {
                                                    const levels = formData.accessLevels.includes(level)
                                                        ? formData.accessLevels.filter(l => l !== level)
                                                        : [...formData.accessLevels, level];
                                                    setFormData({...formData, accessLevels: levels});
                                                }}
                                            />
                                        </label>
                                    ))}
                                </div>
                            </div>

                            {status.message && (
                                <div className={`p-3 rounded-lg text-sm font-bold text-center ${status.type === 'success' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-red-500/10 text-red-400'}`}>
                                    {status.message}
                                </div>
                            )}

                            <div className="flex gap-3 pt-4">
                                <button 
                                    type="button" 
                                    onClick={() => setIsEditModalOpen(false)}
                                    className="flex-1 bg-white/5 hover:bg-white/10 text-[#848E9C] font-bold py-3 rounded-xl transition-all"
                                >
                                    CANCEL
                                </button>
                                <button 
                                    type="submit"
                                    className="flex-1 bg-[#FCD535] hover:bg-[#F0B90B] text-[#0B0E11] font-extrabold py-3 rounded-xl transition-all shadow-lg shadow-[#FCD535]/10"
                                >
                                    SAVE CHANGES
                                </button>
                            </div>
                        </form>
                    </Modal>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<UserManagement />);
    </script>
</body>
</html>
