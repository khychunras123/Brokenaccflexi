<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="robots" content="noindex, nofollow">
    <title>Dashboard - AppFlow UI</title>
    <!-- Tailwind & React CDNs -->
    <script>
        (function() {
            const originalWarn = console.warn;
            console.warn = function(...args) {
                if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com')) {
                    return;
                }
                originalWarn.apply(console, args);
            };
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Moul&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Khmer OS Siemreap', 'Inter', sans-serif; background-color: #0B0E11; color: #EAECEF; }
        .khmer-moul { font-family: 'Khmer OS Siemreap', 'Inter', sans-serif !important; }
        .khmer-siemreap { font-family: 'Khmer OS Siemreap', 'Inter', sans-serif !important; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(252, 213, 53, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(252, 213, 53, 0.4); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .processing-pulse { animation: pulse-bg 2s infinite; }
        @keyframes pulse-bg { 0%, 100% { background-color: rgba(252, 213, 53, 0.1); } 50% { background-color: rgba(252, 213, 53, 0.2); } }
        
        /* New Premium Animations */
        @keyframes pulse-glow {
            0%, 100% { shadow: 0 0 20px rgba(250, 204, 21, 0.4); transform: scale(1.1); }
            50% { shadow: 0 0 40px rgba(250, 204, 21, 0.7); transform: scale(1.15); }
        }
        .animate-pulse-glow { animation: pulse-glow 2s infinite ease-in-out; }
        
        .progress-line-fill { transition: width 1.5s cubic-bezier(0.65, 0, 0.35, 1); }
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bn-bg': '#0B0E11',
                        'bn-surface': '#181A20',
                        'bn-yellow': '#FCD535',
                        'bn-yellow-hover': '#F0B90B',
                        'bn-border': 'rgba(255, 255, 255, 0.05)',
                        'bn-text-secondary': '#848E9C'
                    }
                }
            }
        }
    </script>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script id="main-script" type="text/plain">
        /** @jsx React.createElement */
        /** @jsxFrag React.Fragment */
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Data & Constants ---
        const processingChecklistTemplates = {
            audio: {
                label: 'Earphones / Audio (កាស)',
                tasks: [
                    { id: 'check_sound', label: 'Check Sound (ពិនិត្យសំលេង)' },
                    { id: 'inspect_body', label: 'Inspect Appearance / Body (ពិនិត្យមើលរូបរាង)' },
                    { id: 'check_battery_life', label: 'Check Battery Life (ពិនិត្យមើលថ្មកាស)' }
                ]
            },
            powerBank: {
                label: 'POWER BANK',
                tasks: [
                    { id: 'inspect_body', label: 'Inspect Appearance / Body (check មើល រូបរាង)' },
                    { id: 'check_battery_status', label: 'Check Battery Status (ពិនិត្យមើលថ្ម)' },
                    { id: 'inspect_charging_ports', label: 'Inspect Charging Ports / Inputs (កន្លែងដោតថ្ម)' },
                    { id: 'check_builtin_cables', label: 'Check Built-in Cables / Wires (ពិនិត្យមើលខ្សែរ)' }
                ]
            }
        };

        const getProcessingProductType = (r) => {
            if (r.processingProductType && processingChecklistTemplates[r.processingProductType]) return r.processingProductType;
            const text = `${r.productName} ${r.problemDesc} ${r.barcode || ''}`.toLowerCase();
            
            // Audio / Earphones - Expanded keywords
            const audioRegex = /(earphone|earphones|headphone|headphones|headset|audio|airpod|airpods|កាស|buds|open-ear|speaker|ms03|ms01|oe3|oe4|jr|pods|tws|pro2|pro3|pro4|picun|g2|f6|w3|f8|v5|v6|v7|ear|sound|music|bt|wireless|head|mic)/i;
            if (audioRegex.test(text)) return 'audio';
            
            // Power Bank / Charger - Expanded keywords
            const powerRegex = /(power\s*bank|powerbank|ថ្មសាក|mah|10000|20000|30000|40000|50000|battery|charger|u39|tcl06|wp-u|wp-p|c62|wp-69|wp-89|wp-95|wp-113|movespeed|s10|s20|p03|charging|dock|adapter|cable|usb|type-c|lightning|pd|fast\s*charge)/i;
            if (powerRegex.test(text)) return 'powerBank';
            
            return '';
        };

        // --- Helper Components ---
        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                    <div className="bg-[#181A20] border border-[#FCD535]/30 w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden animate-fade-in max-h-[90vh] flex flex-col">
                        <div className="flex items-center justify-between px-6 py-4 border-b border-white/10 bg-black/20 flex-shrink-0">
                            <h3 className="text-lg font-bold text-[#FCD535] uppercase tracking-tight">{title}</h3>
                            <button onClick={onClose} className="text-[#848E9C] hover:text-white transition-colors">
                                <i className="fa-solid fa-xmark text-xl"></i>
                            </button>
                        </div>
                        <div className="p-6 overflow-y-auto">{children}</div>
                    </div>
                </div>
            );
        };

        // --- Views ---

        const CreateRoleView = ({ onRoleCreated }) => {
            const [formData, setFormData] = useState({ roleName: '', accessLevels: [], loginName: '', password: '', confirmPassword: '' });
            const [isLoading, setIsLoading] = useState(false);
            const [status, setStatus] = useState({ type: '', message: '' });

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (formData.accessLevels.length === 0) { setStatus({ type: 'error', message: 'Select at least one access level.' }); return; }
                if (formData.password !== formData.confirmPassword) { setStatus({ type: 'error', message: 'Passwords do not match.' }); return; }
                
                setIsLoading(true);
                try {
                    const { confirmPassword, ...submitData } = formData;
                    const res = await fetch('/api/roles', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(submitData) });
                    if (res.ok) {
                        setStatus({ type: 'success', message: 'Role created successfully!' });
                        setFormData({ roleName: '', accessLevels: [], loginName: '', password: '', confirmPassword: '' });
                        if (onRoleCreated) onRoleCreated();
                    } else { const data = await res.json(); throw new Error(data.error); }
                } catch (err) { setStatus({ type: 'error', message: err.message }); } finally { setIsLoading(false); }
            };

            return (
                <div className="max-w-4xl mx-auto animate-fade-in space-y-6">
                    <div className="bg-bn-surface border border-bn-border rounded-2xl p-6 shadow-2xl">
                        <div className="flex justify-between items-center mb-6">
                            <h2 className="text-xl font-black text-bn-yellow uppercase tracking-tight">Create New Role</h2>
                            <span className="text-[10px] font-black text-bn-text-secondary bg-white/5 px-2 py-1 rounded">ADMIN ONLY</span>
                        </div>
                        <form onSubmit={handleSubmit} className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="space-y-2">
                                <label className="text-[10px] font-black text-bn-text-secondary uppercase">Role Name</label>
                                <input type="text" className="w-full bg-black/40 border border-bn-border rounded-xl p-3 outline-none focus:border-bn-yellow transition-all text-sm font-bold" value={formData.roleName} onChange={e => setFormData({...formData, roleName: e.target.value})} required />
                            </div>
                            <div className="space-y-2">
                                <label className="text-[10px] font-black text-bn-text-secondary uppercase">Access Levels</label>
                                <div className="grid grid-cols-3 gap-2">
                                    {['User', 'Processing', 'View Only'].map(lvl => (
                                        <button type="button" key={lvl} onClick={() => setFormData(p => ({...p, accessLevels: p.accessLevels.includes(lvl) ? p.accessLevels.filter(l => l !== lvl) : [...p.accessLevels, lvl]}))} className={`p-2 rounded-lg text-[10px] font-black uppercase border transition-all ${formData.accessLevels.includes(lvl) ? 'bg-bn-yellow/10 border-bn-yellow text-bn-yellow' : 'bg-black/20 border-bn-border text-bn-text-secondary'}`}>{lvl}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="space-y-2">
                                <label className="text-[10px] font-black text-bn-text-secondary uppercase">Login Username</label>
                                <input type="text" className="w-full bg-black/40 border border-bn-border rounded-xl p-3 outline-none focus:border-bn-yellow transition-all text-sm font-bold" value={formData.loginName} onChange={e => setFormData({...formData, loginName: e.target.value})} required />
                            </div>
                            <div className="space-y-2"></div>
                            <div className="space-y-2">
                                <label className="text-[10px] font-black text-bn-text-secondary uppercase">Password</label>
                                <input type="password" placeholder="••••••••" className="w-full bg-black/40 border border-bn-border rounded-xl p-3 outline-none focus:border-bn-yellow transition-all text-sm font-bold" value={formData.password} onChange={e => setFormData({...formData, password: e.target.value})} required />
                            </div>
                            <div className="space-y-2">
                                <label className="text-[10px] font-black text-bn-text-secondary uppercase">Confirm Password</label>
                                <input type="password" placeholder="••••••••" className="w-full bg-black/40 border border-bn-border rounded-xl p-3 outline-none focus:border-bn-yellow transition-all text-sm font-bold" value={formData.confirmPassword} onChange={e => setFormData({...formData, confirmPassword: e.target.value})} required />
                            </div>
                            {status.message && <div className={`md:col-span-2 text-center text-xs font-black uppercase ${status.type === 'success' ? 'text-emerald-500' : 'text-red-500'}`}>{status.message}</div>}
                            <div className="md:col-span-2 flex justify-end">
                                <button type="submit" disabled={isLoading} className="bg-bn-yellow hover:bg-bn-yellow-hover text-bn-bg px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest transition-all shadow-lg disabled:opacity-50">
                                    {isLoading ? <i className="fa-solid fa-circle-notch fa-spin mr-2"></i> : <i className="fa-solid fa-plus mr-2"></i>}
                                    Create Role
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        const UserManagementView = () => {
            const [users, setUsers] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [isEditModalOpen, setIsEditModalOpen] = useState(false);
            const [editingUser, setEditingUser] = useState(null);
            const [showPassword, setShowPassword] = useState(false);
            const [formData, setFormData] = useState({ roleName: '', loginName: '', password: '', accessLevels: [] });

            useEffect(() => { fetchUsers(); }, []);
            const fetchUsers = async () => {
                try {
                    setIsLoading(true);
                    const res = await fetch('/api/roles');
                    const data = await res.json();
                    setUsers(data);
                } finally { setIsLoading(false); }
            };

            const handleUpdate = async (e) => {
                e.preventDefault();
                try {
                    const res = await fetch(`/api/roles/${editingUser._id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(formData) });
                    if (res.ok) { setIsEditModalOpen(false); fetchUsers(); }
                } catch (err) { console.error(err); }
            };

            return (
                <div className="animate-fade-in space-y-6">
                    <div className="bg-bn-surface border border-bn-border rounded-2xl overflow-hidden shadow-2xl">
                        <table className="w-full text-left">
                            <thead className="bg-black/40 text-[10px] font-black text-bn-text-secondary uppercase tracking-[0.1em]">
                                <tr>
                                    <th className="px-6 py-5">User Identity</th>
                                    <th className="px-6 py-5">Login ID</th>
                                    <th className="px-6 py-4">Permissions</th>
                                    <th className="px-6 py-4">Status</th>
                                    <th className="px-6 py-4 text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-white/5">
                                {isLoading ? <tr><td colSpan="5" className="py-20 text-center"><i className="fa-solid fa-circle-notch fa-spin text-2xl text-bn-yellow"></i></td></tr> :
                                users.map(user => (
                                    <tr key={user._id} className="hover:bg-white/[0.02] group transition-colors">
                                        <td className="px-6 py-4">
                                            <div className="flex items-center gap-3">
                                                <div className="w-10 h-10 rounded-full bg-bn-yellow text-bn-bg flex items-center justify-center font-black text-xs uppercase">{user.roleName.substring(0,2)}</div>
                                                <div>
                                                    <div className="font-extrabold text-sm text-white">{user.roleName}</div>
                                                    <div className="text-[10px] font-mono text-bn-text-secondary">ID: {user._id.slice(-6).toUpperCase()}</div>
                                                </div>
                                            </div>
                                        </td>
                                        <td className="px-6 py-4 font-mono text-xs text-bn-text-secondary bg-black/10">{user.loginName}</td>
                                        <td className="px-6 py-4">
                                            <div className="flex flex-wrap gap-1.5">
                                                {user.isUser && <span className="text-[9px] font-black uppercase px-2 py-0.5 rounded-full bg-blue-500/10 text-blue-400 border border-blue-500/20">User</span>}
                                                {user.canProcess && <span className="text-[9px] font-black uppercase px-2 py-0.5 rounded-full bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">Processing</span>}
                                                {user.isViewOnly && <span className="text-[9px] font-black uppercase px-2 py-0.5 rounded-full bg-orange-500/10 text-orange-400 border border-orange-500/20">View Only</span>}
                                            </div>
                                        </td>
                                        <td className="px-6 py-4">
                                            <div className="flex items-center gap-2 text-[10px] font-black uppercase text-emerald-500">
                                                <div className="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div>
                                                Active
                                            </div>
                                        </td>
                                        <td className="px-6 py-4 text-right">
                                            <div className="flex justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                <button onClick={() => { setEditingUser(user); setShowPassword(false); setFormData({ roleName: user.roleName, loginName: user.loginName, password: '', accessLevels: [user.isUser && 'User', user.canProcess && 'Processing', user.isViewOnly && 'View Only'].filter(Boolean) }); setIsEditModalOpen(true); }} className="w-9 h-9 flex items-center justify-center rounded-xl bg-white/5 hover:bg-bn-yellow hover:text-bn-bg transition-all"><i className="fa-solid fa-pen-to-square"></i></button>
                                                <button onClick={async () => { if(confirm('Delete user?')) { await fetch(`/api/roles/${user._id}`, {method:'DELETE'}); fetchUsers(); } }} className="w-9 h-9 flex items-center justify-center rounded-xl bg-white/5 hover:bg-red-500 transition-all"><i className="fa-solid fa-trash-can"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    <Modal isOpen={isEditModalOpen} onClose={() => setIsEditModalOpen(false)} title="Edit User Identity">
                        <form onSubmit={handleUpdate} className="space-y-4">
                            <div className="space-y-1">
                                <label className="text-[10px] font-black text-bn-text-secondary uppercase">Display Name</label>
                                <input type="text" className="w-full bg-black/40 border border-bn-border rounded-xl p-3 outline-none focus:border-bn-yellow transition-all text-sm font-bold" value={formData.roleName} onChange={e => setFormData({...formData, roleName: e.target.value})} required />
                            </div>
                            <div className="space-y-1">
                                <label className="text-[10px] font-black text-bn-text-secondary uppercase">Username</label>
                                <input type="text" className="w-full bg-black/40 border border-bn-border rounded-xl p-3 outline-none focus:border-bn-yellow transition-all text-sm font-bold" value={formData.loginName} onChange={e => setFormData({...formData, loginName: e.target.value})} required />
                            </div>
                            <div className="space-y-1">
                                <label className="text-[10px] font-black text-bn-text-secondary uppercase">Change Password (Optional)</label>
                                <div className="relative">
                                    <input type={showPassword ? 'text' : 'password'} placeholder="••••••••" className="w-full bg-black/40 border border-bn-border rounded-xl p-3 outline-none focus:border-bn-yellow transition-all text-sm font-bold pr-12" value={formData.password} onChange={e => setFormData({...formData, password: e.target.value})} />
                                    <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-4 top-1/2 -translate-y-1/2 text-bn-text-secondary hover:text-bn-yellow transition-colors">
                                        <i className={`fa-solid ${showPassword ? 'fa-eye-slash' : 'fa-eye'}`}></i>
                                    </button>
                                </div>
                            </div>
                            <div className="space-y-1">
                                <label className="text-[10px] font-black text-bn-text-secondary uppercase">Permissions</label>
                                <div className="grid grid-cols-1 gap-2">
                                    {['User', 'Processing', 'View Only'].map(lvl => (
                                        <button type="button" key={lvl} onClick={() => setFormData(p => ({...p, accessLevels: p.accessLevels.includes(lvl) ? p.accessLevels.filter(l => l !== lvl) : [...p.accessLevels, lvl]}))} className={`p-4 rounded-xl text-xs font-black uppercase border flex justify-between items-center transition-all ${formData.accessLevels.includes(lvl) ? 'bg-bn-yellow/10 border-bn-yellow text-bn-yellow' : 'bg-black/20 border-bn-border text-bn-text-secondary'}`}>
                                            {lvl} Access
                                            {formData.accessLevels.includes(lvl) && <i className="fa-solid fa-check"></i>}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="flex gap-4 pt-4">
                                <button type="button" onClick={() => setIsEditModalOpen(false)} className="flex-1 bg-white/5 hover:bg-white/10 text-bn-text-secondary font-black py-4 rounded-2xl transition-all uppercase text-[10px]">Cancel</button>
                                <button type="submit" className="flex-1 bg-bn-yellow hover:bg-bn-yellow-hover text-bn-bg font-black py-4 rounded-2xl transition-all uppercase text-[10px] shadow-lg">Save Changes</button>
                            </div>
                        </form>
                    </Modal>
                </div>
            );
        };

        const ReportsView = ({ type, reports, canManageReports, currentUser, onProcess, onStatusChange, onShowDetails, onDelete }) => {
            const [activeArchiveTab, setActiveArchiveTab] = useState('RETURNED');

            const filteredReports = useMemo(() => {
                if (type === 'broken') return reports.filter(r => !['processing', 'completed', 'RETURNED', 'REPLACED_NEW'].includes(r.status));
                if (type === 'processing') return reports.filter(r => r.status === 'processing');
                if (type === 'archive') return reports.filter(r => r.status === activeArchiveTab);
                return reports;
            }, [reports, type, activeArchiveTab]);

            const groupedReportsByDate = useMemo(() => {
                const groups = {};
                filteredReports.forEach(report => {
                    const date = new Date(report.timestamp).toLocaleDateString('km-KH', { 
                        day: 'numeric', 
                        month: 'long', 
                        year: 'numeric' 
                    });
                    if (!groups[date]) groups[date] = [];
                    groups[date].push(report);
                });
                return groups;
            }, [filteredReports]);

            const renderLinearProgressFlow = (status) => {
                const steps = [
                    { id: 'pending', label: 'Pending', icon: 'fa-clock' },
                    { id: 'processing', label: 'Processing', icon: 'fa-spinner' },
                    { id: 'completed', label: 'Completed', icon: 'fa-check-double' }
                ];
                
                let activeIndex = 0;
                if (status === 'processing') activeIndex = 1;
                if (['RETURNED', 'REPLACED_NEW', 'completed'].includes(status)) activeIndex = 2;
                if (status === 'DELETED') activeIndex = -1;

                // Calculate progress line width
                const progressWidth = activeIndex === -1 ? 0 : (activeIndex / (steps.length - 1)) * 100;

                return (
                    <div className="relative w-full py-12 bg-[#0d0e12] rounded-[40px] overflow-hidden mb-10 border border-white/5 shadow-2xl animate-fade-in">
                        {status === 'DELETED' && (
                            <div className="absolute inset-0 flex items-center justify-center bg-black/60 z-20">
                                <span className="text-6xl font-black text-red-600/30 uppercase tracking-[0.5em] -rotate-12 select-none pointer-events-none">DELETED</span>
                            </div>
                        )}
                        {/* Precision Aligned Progress Track */}
                        <div className="absolute top-[76px] left-20 right-20 h-[3px] bg-white/[0.03] z-0 -translate-y-1/2 overflow-hidden rounded-full">
                            <div 
                                className={`h-full progress-line-fill shadow-[0_0_25px_rgba(250,204,21,0.6)] ${status === 'DELETED' ? 'bg-red-600' : 'bg-[#FACC15]'}`} 
                                style={{ width: `${progressWidth}%` }}
                            ></div>
                        </div>

                        <div className="relative z-10 flex justify-between items-center px-20">
                            {steps.map((step, index) => {
                                const isActive = index === activeIndex;
                                const isCompleted = index < activeIndex;
                                return (
                                    <div key={step.id} className={`flex flex-col items-center w-32 group animate-fade-in stagger-${index + 1}`}>
                                        <div className={`w-14 h-14 rounded-full flex items-center justify-center transition-all duration-1000 border-2
                                            ${isActive 
                                                ? 'bg-[#FACC15] border-[#FACC15] text-[#0d0e12] shadow-[0_0_40px_rgba(250,204,21,0.6)] scale-110 animate-pulse-glow' 
                                                : isCompleted
                                                    ? 'bg-[#FACC15] border-[#FACC15] text-[#0d0e12] shadow-[0_0_15px_rgba(250,204,21,0.2)]'
                                                    : 'bg-[#181a20] border-white/5 text-[#848E9C]'}`}>
                                            <i className={`fa-solid ${isCompleted ? 'fa-check-double' : step.icon} 
                                                ${isActive && step.id === 'processing' ? 'fa-spin' : ''} 
                                                ${!isActive && !isCompleted ? 'opacity-20' : ''} 
                                                text-xl`}></i>
                                        </div>
                                        <span className={`mt-5 text-[11px] font-black uppercase tracking-[0.3em] text-center transition-all duration-1000
                                            ${isActive || isCompleted ? 'text-[#FACC15] drop-shadow-[0_0_8px_rgba(250,204,21,0.4)]' : 'text-[#848E9C]'}`}>

                        </div>
                    </div>
                );
            };

            const renderProcessingChecklist = (report) => {
                const type = getProcessingProductType(report);
                const template = processingChecklistTemplates[type];
                const checkedState = report.processingChecklist || {};
                const completedCount = template ? template.tasks.filter(t => checkedState[t.id]).length : 0;
                const progress = template ? (completedCount / template.tasks.length) * 100 : 0;

                return (
                    <div className="mt-4 p-4 bg-black/30 rounded-xl border border-white/5 space-y-3">
                        <div className="flex justify-between items-center">
                            <div className="flex flex-col flex-1">
                                {template ? (
                                    <span className="text-[10px] font-black text-white uppercase">{template.label}</span>
                                ) : (
                                    <select 
                                        className="bg-red-500/10 border border-red-500/30 text-red-400 text-[9px] font-black uppercase rounded-lg px-2 py-1 outline-none cursor-pointer"
                                        disabled={report.status === 'DELETED'}
                                        onChange={async (e) => {
                                            const newType = e.target.value;
                                            if (!newType) return;
                                            await fetch(`/api/reports/${report.reportId}`, { 
                                                method: 'PUT', 
                                                headers: { 'Content-Type': 'application/json' }, 
                                                body: JSON.stringify({ processingProductType: newType, processingChecklist: {} }) 
                                            });
                                            onStatusChange(report.reportId, 'processing'); // Trigger refresh
                                        }}
                                        defaultValue=""
                                    >
                                        <option value="" disabled>Select Type (Unknown)</option>
                                        <option value="audio">Earphones / Audio</option>
                                        <option value="powerBank">Power Bank</option>

                        {template && (
                            <div className="h-1 bg-white/5 rounded-full overflow-hidden">
                                <div className="h-full bg-bn-yellow shadow-[0_0_10px_rgba(252,213,53,0.4)] transition-all" style={{width:`${progress}%`}}></div>

                        {template && template.tasks.map((task, idx) => {
                            const isDone = checkedState[task.id];
                            return (
                                <label key={task.id} className={`flex items-center gap-3 p-2 rounded-lg transition-all ${report.status === 'DELETED' ? 'cursor-default opacity-50' : 'hover:bg-white/5 cursor-pointer group'}`}>

                                    <span className={`text-[11px] font-bold flex-1 ${isDone ? 'text-emerald-500' : 'text-bn-text-secondary'}`}>{task.label}</span>

            return (
                <div className="animate-fade-in space-y-8">
                    <div className="flex flex-col gap-6">
                        <div className="flex justify-between items-center">
                            <h3 className="text-xl font-black text-white uppercase tracking-tight khmer-siemreap">
                                {type === 'broken' && 'Broken Product Queue'}
                                {type === 'processing' && 'Production Processing'}
                                {type === 'archive' && 'INSPECTED'}
                            </h3>
                            {type === 'archive' && (
                                <div className="flex bg-bn-surface border border-bn-border p-1 rounded-xl">
                                    <button onClick={() => setActiveArchiveTab('RETURNED')} className={`px-4 py-2 rounded-lg text-[9px] font-black uppercase transition-all ${activeArchiveTab === 'RETURNED' ? 'bg-bn-yellow text-bn-bg shadow-lg' : 'text-bn-text-secondary hover:text-white'}`}>Returned Items</button>
                                    <button onClick={() => setActiveArchiveTab('REPLACED_NEW')} className={`px-4 py-2 rounded-lg text-[9px] font-black uppercase transition-all ${activeArchiveTab === 'REPLACED_NEW' ? 'bg-bn-yellow text-bn-bg shadow-lg' : 'text-bn-text-secondary hover:text-white'}`}>Replaced New</button>
                                </div>
                            )}
                        </div>
                        {renderLinearProgressFlow(type === 'broken' ? 'pending' : (type === 'processing' ? 'processing' : activeArchiveTab))}
                    </div>

                    <div className="space-y-12">
                        {Object.keys(groupedReportsByDate).length === 0 ? (
                            <div className="py-20 text-center bg-bn-surface/50 border border-bn-border rounded-3xl text-bn-text-secondary font-black uppercase text-sm tracking-widest italic opacity-30">
                                No items in this sector.
                            </div>
                        ) : (
                            Object.keys(groupedReportsByDate)
                                .sort((a, b) => {
                                    // Parse date strings back to objects for comparison (newest first)
                                    // km-KH format is usually "DD Month YYYY"
                                    const dateA = new Date(groupedReportsByDate[a][0].timestamp);
                                    const dateB = new Date(groupedReportsByDate[b][0].timestamp);
                                    return dateB - dateA;
                                })
                                .map(date => (
                                <div key={date} className="space-y-6">
                                    <div className="flex items-center gap-4">
                                        <div className="h-[1px] flex-1 bg-white/10"></div>
                                        <h4 className="text-[11px] font-black text-bn-yellow uppercase tracking-[0.3em] bg-bn-surface px-4 py-2 rounded-full border border-bn-yellow/20">
                                            {date}
                                        </h4>
                                        <div className="h-[1px] flex-1 bg-white/10"></div>
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 gap-6">
                                        {groupedReportsByDate[date].map(report => (
                                            <div key={report.reportId} className={`relative bg-bn-surface border rounded-3xl overflow-hidden group transition-all duration-300 ${type === 'processing' ? 'border-bn-yellow/30 shadow-[0_0_30px_rgba(252,213,53,0.05)]' : 'border-bn-border hover:border-white/10'} ${report.status === 'DELETED' ? 'grayscale opacity-80 border-red-500/20 shadow-inner bg-black/40' : ''}`}>
                                                {report.status === 'DELETED' && (
                                                    <div className="absolute inset-0 flex items-center justify-center z-20 select-none pointer-events-none">
                                                        <span className="text-4xl font-black text-red-600/40 uppercase tracking-[0.2em] -rotate-12">DELETED</span>
                                                    </div>
                                                )}
                                                <div className={`flex justify-between items-center px-5 py-4 bg-black/30 border-b border-white/5`}>
                                                    <div className="flex items-center gap-3">
                                                        <span className={`text-[10px] font-black font-mono ${report.status === 'DELETED' ? 'text-red-500' : 'text-bn-yellow'}`}>{report.reportId}</span>
                                                        <div className={`w-1.5 h-1.5 rounded-full animate-pulse ${report.status === 'DELETED' ? 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]' : 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]'}`}></div>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-[9px] bg-indigo-600/20 text-indigo-400 border border-indigo-500/20 px-2 py-0.5 rounded-full font-black uppercase tracking-widest">
                                                            {report.teamLead ? `TEAM ${report.teamLead}` : (report.teamGroup ? report.teamGroup.split('-').pop().trim() : 'TEAM')}
                                                        </span>
                                                        {currentUser.role === 'Admin' && report.status !== 'DELETED' && (
                                                            <button 
                                                                onClick={() => onDelete(report.reportId)}
                                                                className="w-6 h-6 flex items-center justify-center rounded-lg bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-all"
                                                                title="Cancel Order"
                                                            >
                                                                <i className="fa-solid fa-trash-can text-[10px]"></i>
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                                <div className="p-5 flex gap-4">
                                                    <div className="w-20 h-20 bg-white rounded-2xl flex items-center justify-center flex-shrink-0 overflow-hidden border border-white/10 shadow-inner">
                                                        {(report.photo || report.customerPhoto) ? 
                                                            <img src={report.photo || report.customerPhoto} className="w-full h-full object-contain" /> : 
                                                            <i className="fa-solid fa-headphones text-3xl text-gray-300"></i>}
                                                    </div>
                                                    <div className="min-w-0 flex-1 space-y-2">
                                                        <h4 className="font-black text-sm text-white truncate uppercase tracking-tight">{report.name || 'ANONYMOUS'}</h4>
                                                        <div className="space-y-1">
                                                            <p className="text-[10px] text-bn-text-secondary font-bold truncate flex items-center gap-1.5"><i className="fa-solid fa-store opacity-50"></i> {report.teamPage}</p>
                                                            <p className="text-[10px] text-bn-text-secondary font-bold line-clamp-2 leading-relaxed opacity-70 italic">{report.problemDesc}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                                {type === 'processing' && renderProcessingChecklist(report)}
                                                <div className="p-4 bg-black/20 border-t border-white/5 flex gap-2">
                                                    <button onClick={() => onShowDetails(report)} className="flex-1 bg-white/5 py-3 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-white/10 transition-all">Details</button>
                                                    {type === 'broken' && canManageReports && report.status !== 'DELETED' && <button onClick={() => onProcess(report.reportId)} className="flex-[2] bg-bn-yellow text-bn-bg py-3 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-bn-yellow-hover shadow-lg transition-all active:scale-95">Initiate Process</button>}
                                                    {type === 'processing' && canManageReports && report.status !== 'DELETED' && (
                                                        <>
                                                            <button onClick={() => onStatusChange(report.reportId, 'pending')} className="flex-1 bg-red-500/10 border border-red-500/20 text-red-500 py-3 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-red-500/20 transition-all flex items-center justify-center gap-1.5" title="Undo / Cancel Process"><i className="fa-solid fa-rotate-left"></i> Undo</button>
                                                            <button onClick={() => onStatusChange(report.reportId, 'RETURNED')} className="flex-1 bg-white/5 border border-white/10 text-bn-text-secondary py-3 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-white/10 transition-all">Return</button>
                                                            <button onClick={() => onStatusChange(report.reportId, 'REPLACED_NEW')} className="flex-1 bg-emerald-500/10 border border-emerald-500/20 text-emerald-500 py-3 rounded-xl text-[9px] font-black uppercase tracking-widest hover:bg-emerald-500/20 transition-all">Replace</button>
                                                        </>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        };

        const MonthlyReportView = ({ reports }) => {
            const monthlyStats = useMemo(() => {
                const stats = {};
                reports.forEach(r => {
                    const date = new Date(r.timestamp);
                    const monthYear = date.toLocaleDateString('km-KH', { month: 'long', year: 'numeric' });
                    if (!stats[monthYear]) stats[monthYear] = { total: 0, pending: 0, processing: 0, returned: 0, replaced: 0 };
                    stats[monthYear].total++;
                    if (r.status === 'pending') stats[monthYear].pending++;
                    else if (r.status === 'processing') stats[monthYear].processing++;
                    else if (r.status === 'RETURNED') stats[monthYear].returned++;
                    else if (r.status === 'REPLACED_NEW') stats[monthYear].replaced++;
                });
                return stats;
            }, [reports]);

            const handleExportExcel = () => {
                const data = Object.entries(monthlyStats).map(([month, stats]) => ({
                    'Month/Year': month,
                    'Total Reports': stats.total,
                    'Pending': stats.pending,
                    'Processing': stats.processing,
                    'Returned': stats.returned,
                    'Replaced New': stats.replaced
                }));

                const worksheet = XLSX.utils.json_to_sheet(data);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Monthly Summary");
                XLSX.writeFile(workbook, `Monthly_Report_Summary_${new Date().toISOString().slice(0,10)}.xlsx`);
            };

            return (
                <div className="animate-fade-in space-y-6">
                    <div className="flex justify-between items-center">
                        <div className="space-y-1">
                            <h3 className="text-xl font-black text-white uppercase tracking-tight khmer-siemreap">Monthly Report Summary</h3>
                            <div className="text-[10px] font-black text-bn-text-secondary tracking-widest uppercase opacity-40">System Audit / Monthly / Data_Flow</div>
                        </div>
                        <div className="flex items-center gap-3">
                            <button 
                                onClick={handleExportExcel}
                                className="bg-emerald-500/10 border border-emerald-500/20 text-emerald-500 px-6 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center gap-2 hover:bg-emerald-500/20 transition-all shadow-lg"
                            >
                                <i className="fa-solid fa-file-excel"></i>
                                Export Excel
                            </button>
                            <span className="text-[10px] font-black text-bn-text-secondary bg-white/5 px-4 py-3 rounded-2xl border border-white/5">ADMIN DATA</span>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {Object.entries(monthlyStats).map(([month, data]) => (
                            <div key={month} className="bg-bn-surface border border-bn-border rounded-2xl p-6 shadow-2xl space-y-4">
                                <div className="flex justify-between items-center border-b border-white/5 pb-4">
                                    <span className="text-sm font-black text-bn-yellow uppercase tracking-widest">{month}</span>
                                    <span className="text-[10px] font-bold text-bn-text-secondary">TOTAL: {data.total}</span>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-black/20 p-3 rounded-xl border border-white/5">
                                        <div className="text-[9px] font-black text-bn-text-secondary uppercase">Pending</div>
                                        <div className="text-lg font-black text-white">{data.pending}</div>
                                    </div>
                                    <div className="bg-black/20 p-3 rounded-xl border border-white/5">
                                        <div className="text-[9px] font-black text-bn-text-secondary uppercase">Processing</div>
                                        <div className="text-lg font-black text-bn-yellow">{data.processing}</div>
                                    </div>
                                    <div className="bg-black/20 p-3 rounded-xl border border-white/5">
                                        <div className="text-[9px] font-black text-bn-text-secondary uppercase">Returned</div>
                                        <div className="text-lg font-black text-blue-400">{data.returned}</div>
                                    </div>
                                    <div className="bg-black/20 p-3 rounded-xl border border-white/5">
                                        <div className="text-[9px] font-black text-bn-text-secondary uppercase">Replaced</div>
                                        <div className="text-lg font-black text-emerald-500">{data.replaced}</div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- Main Dashboard Layout ---

        const Dashboard = () => {
            const [currentView, setCurrentView] = useState('Broken Product');
            const [reports, setReports] = useState([]);
            const [currentUser, setCurrentUser] = useState({ name: 'User Name', role: 'StandardUser' });
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedReport, setSelectedReport] = useState(null);

            useEffect(() => {
                const userRole = localStorage.getItem('userRole');
                const username = localStorage.getItem('username');
                if (!userRole) { window.location.replace('login.html'); return; }
                setCurrentUser({ name: username || 'User Name', role: userRole });
                fetchReports();
                const interval = setInterval(fetchReports, 30000); // Auto-sync
                return () => clearInterval(interval);
            }, []);

            const fetchReports = async () => {
                try {
                    const res = await fetch('/api/reports');
                    const data = await res.json();
                    const sortedData = Array.isArray(data) ? data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)) : [];
                    setReports(sortedData);
                } catch (err) { console.error(err); }
            };

            const handleProcess = async (id) => {
                const report = reports.find(r => r.reportId === id);
                const type = report ? getProcessingProductType(report) : '';
                await fetch(`/api/reports/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ status:'processing', processingProductType: type, processingChecklist:{} }) });
                await fetchReports();
                setCurrentView('Product Processing');
            };

            const handleStatusChange = async (id, status) => {
                await fetch(`/api/reports/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ status }) });
                await fetchReports();
            };

            const handleDeleteReport = async (id) => {
                if (!confirm('Are you sure you want to delete this report? This action cannot be undone.')) return;
                try {
                    const res = await fetch(`/api/reports/${id}`, { method: 'DELETE' });
                    if (res.ok) {
                        setReports(prev => prev.filter(r => r.reportId !== id));
                    } else {
                        alert('Failed to delete report.');
                    }
                } catch (err) {
                    console.error('Delete error:', err);
                    alert('An error occurred while deleting.');
                }
            };

            const filteredReports = useMemo(() => {
                const q = searchQuery.toLowerCase();
                return reports.filter(r => 
                    r.reportId.toLowerCase().includes(q) ||
                    r.name.toLowerCase().includes(q) ||
                    r.teamPage.toLowerCase().includes(q) ||
                    r.productName.toLowerCase().includes(q)
                );
            }, [reports, searchQuery]);

            const canManageReports = currentUser.role === 'Admin' || currentUser.role === 'InventoryChecker';

            const menuItems = [
                { name: 'Broken Product', icon: 'fa-house', section: 'MAIN MENU' },
                { name: 'Product Processing', icon: 'fa-spinner', section: 'MAIN MENU' },
                { name: 'INSPECTED', icon: 'fa-check-double', section: 'MAIN MENU' },
                { name: 'Monthly Report', icon: 'fa-file-lines', section: 'SYSTEM', adminOnly: true },
                { name: 'Product Catalog', icon: 'fa-box-open', section: 'SYSTEM', isLink: true, url: 'product-list.html', adminOnly: true },
                { name: 'User Management', icon: 'fa-users-gear', section: 'SYSTEM', adminOnly: true },
                { name: 'Create Role', icon: 'fa-user-shield', section: 'SYSTEM', adminOnly: true },
                { name: 'Settings', icon: 'fa-gear', section: 'SYSTEM' }
            ];

            return (
                <div className="flex h-screen overflow-hidden bg-bn-bg text-white selection:bg-bn-yellow selection:text-bn-bg">
                    {/* Sidebar */}
                    <aside className={`fixed inset-y-0 left-0 z-50 w-72 bg-bn-surface border-r border-bn-border shadow-[10px_0_40px_rgba(0,0,0,0.5)] transition-all duration-500 transform ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} lg:translate-x-0 flex flex-col`}>
                        <div className="p-8 border-b border-white/5 bg-black/20">
                            <div className="flex items-center gap-4 text-bn-yellow font-black text-2xl tracking-tighter">
                                <div className="w-10 h-10 bg-bn-yellow rounded-xl flex items-center justify-center text-bn-bg shadow-[0_0_20px_rgba(252,213,53,0.3)]">
                                    <i className="fa-solid fa-chart-line"></i>
                                </div>
                                <span className="uppercase italic">AppFlow</span>
                            </div>
                        </div>

                        <div className="p-6">
                            <a href="step-form.html" className="w-full bg-bn-yellow hover:bg-bn-yellow-hover text-bn-bg py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-3 shadow-[0_10px_20px_rgba(252,213,53,0.2)] transition-all active:scale-95 group">
                                <i className="fa-solid fa-plus group-hover:rotate-90 transition-transform duration-500"></i>
                                Submit New Report
                            </a>
                        </div>

                        <nav className="flex-1 overflow-y-auto px-4 space-y-8 pt-4 custom-scrollbar">
                            {['MAIN MENU', 'SYSTEM'].map(section => (
                                <div key={section} className="space-y-2">
                                    <div className="px-5 text-[10px] font-black text-bn-text-secondary tracking-[0.2em] uppercase opacity-40">{section}</div>
                                    <div className="space-y-1">
                                        {menuItems.filter(item => item.section === section && (!item.adminOnly || currentUser.role === 'Admin')).map(item => (
                                            item.isLink ? (
                                                <a 
                                                    key={item.name}
                                                    href={item.url}
                                                    className={`w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl text-xs font-black transition-all duration-300 text-bn-text-secondary hover:bg-white/5 hover:text-white`}
                                                >
                                                    <div className={`w-8 h-8 rounded-lg flex items-center justify-center transition-all bg-black/20 text-bn-text-secondary`}>
                                                        <i className={`fa-solid ${item.icon}`}></i>
                                                    </div>
                                                    <span className="uppercase tracking-widest">{item.name}</span>
                                                    <i className="fa-solid fa-arrow-up-right-from-square ml-auto text-[10px] opacity-30"></i>
                                                </a>
                                            ) : (
                                            <button 
                                                key={item.name}
                                                onClick={() => { setCurrentView(item.name); setIsSidebarOpen(false); }}
                                                className={`w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl text-xs font-black transition-all duration-300 ${currentView === item.name ? 'bg-bn-yellow/10 text-bn-yellow shadow-inner' : 'text-bn-text-secondary hover:bg-white/5 hover:text-white'}`}
                                            >
                                                <div className={`w-8 h-8 rounded-lg flex items-center justify-center transition-all ${currentView === item.name ? 'bg-bn-yellow text-bn-bg' : 'bg-black/20 text-bn-text-secondary'}`}>
                                                    <i className={`fa-solid ${item.icon}`}></i>
                                                </div>
                                                <span className="uppercase tracking-widest">{item.name}</span>
                                                {currentView === item.name && <div className="ml-auto w-1.5 h-1.5 rounded-full bg-bn-yellow shadow-[0_0_8px_rgba(252,213,53,0.8)]"></div>}
                                            </button>
                                            )
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </nav>

                        {/* Active Shift Card */}
                        <div className="p-6 mt-auto bg-black/40 border-t border-white/5">
                            <div className="bg-[#1E2329] rounded-3xl p-5 border border-white/5 space-y-4 shadow-2xl relative overflow-hidden group">
                                <div className="absolute top-0 right-0 w-24 h-24 bg-bn-yellow/5 rounded-full blur-3xl -mr-12 -mt-12 transition-all duration-700 group-hover:scale-150"></div>
                                <div className="text-[10px] font-black text-bn-text-secondary tracking-[0.2em] uppercase opacity-50">Active Shift</div>
                                <div className="flex items-center gap-4 relative z-10">
                                    <div className="w-12 h-12 bg-gradient-to-br from-bn-yellow to-bn-yellow-hover rounded-2xl flex items-center justify-center text-bn-bg font-black text-sm shadow-lg ring-2 ring-bn-yellow/20">
                                        {currentUser.name.substring(0,2).toUpperCase()}
                                    </div>
                                    <div className="min-w-0 flex-1">
                                        <div className="flex items-center gap-2">
                                            <div className="w-2 h-2 bg-emerald-500 rounded-full shadow-[0_0_10px_rgba(16,185,129,0.8)]"></div>
                                            <div className="font-black text-sm truncate uppercase tracking-tight">{currentUser.name}</div>
                                        </div>
                                        <div className="text-[10px] text-bn-text-secondary font-bold mt-1 opacity-70 italic">Started: {new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                                    </div>
                                </div>
                                <button className={`w-full py-3 rounded-xl text-[9px] font-black tracking-[0.2em] uppercase transition-all duration-500 ${canManageReports ? 'bg-bn-yellow text-bn-bg shadow-lg hover:shadow-bn-yellow/20 active:scale-95' : 'bg-white/5 text-bn-text-secondary cursor-default'}`}>
                                    {canManageReports ? 'Admin Access Granted' : 'View Only Mode'}
                                </button>
                            </div>
                            <button onClick={() => { localStorage.clear(); window.location.replace('login.html'); }} className="w-full mt-6 flex items-center justify-center gap-3 px-5 py-3 text-bn-text-secondary hover:text-red-500 transition-all duration-300 text-[10px] font-black uppercase tracking-widest group">
                                <i className="fa-solid fa-right-from-bracket group-hover:-translate-x-1 transition-transform"></i>
                                Terminate Session
                            </button>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col min-w-0 lg:ml-72 relative">
                        {/* PERSISTENT HEADER (as requested) */}
                        <header className="sticky top-0 z-40 bg-bn-bg/80 backdrop-blur-xl border-b border-bn-yellow/20 shadow-2xl">
                            {/* Top Bar */}
                            <div className="h-20 flex items-center justify-between px-8 lg:px-12">
                                <div className="flex items-center gap-6">
                                    <button onClick={() => setIsSidebarOpen(true)} className="lg:hidden w-10 h-10 flex items-center justify-center rounded-xl bg-white/5 text-white">
                                        <i className="fa-solid fa-bars"></i>
                                    </button>
                                    <div className="flex flex-col">
                                        <h2 className="text-2xl font-black tracking-tighter uppercase italic bg-gradient-to-r from-white to-bn-text-secondary bg-clip-text text-transparent">{currentView}</h2>
                                        <div className="flex items-center gap-2 text-[9px] font-black text-bn-text-secondary tracking-widest uppercase opacity-40">
                                            Sector / Global / {currentView.replace(' ','_')}
                                        </div>
                                    </div>
                                </div>
                                <div className="flex items-center gap-3 bg-emerald-500/10 border border-emerald-500/20 px-4 py-2 rounded-2xl shadow-[0_0_20px_rgba(16,185,129,0.1)]">
                                    <div className="w-2 h-2 bg-emerald-500 rounded-full shadow-[0_0_8px_rgba(16,185,129,0.8)] animate-pulse"></div>
                                    <span className="text-[10px] text-emerald-500 font-black tracking-[0.2em] uppercase">System Online</span>
                                </div>
                            </div>

                            {/* Search Bar Row (Persistent) */}
                            <div className="px-8 lg:px-12 pb-6">
                                <div className="bg-bn-surface border border-white/5 p-4 rounded-3xl flex items-center gap-6 shadow-2xl relative overflow-hidden group">
                                    <div className="absolute inset-0 bg-gradient-to-r from-bn-yellow/0 via-bn-yellow/[0.02] to-bn-yellow/0 -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
                                    <div className="relative flex-1">
                                        <i className="fa-solid fa-search absolute left-5 top-1/2 -translate-y-1/2 text-bn-text-secondary text-sm group-focus-within:text-bn-yellow transition-colors"></i>
                                        <input 
                                            type="text" 
                                            placeholder="Search reports, customers, unique IDs, or system records..."
                                            className="w-full bg-black/40 border border-white/10 rounded-2xl py-3.5 pl-14 pr-6 outline-none focus:border-bn-yellow/50 transition-all text-sm font-bold placeholder:text-bn-text-secondary/30"
                                            value={searchQuery}
                                            onChange={(e) => setSearchQuery(e.target.value)}
                                        />
                                    </div>
                                    <div className="flex items-center gap-4 shrink-0 relative">
                                        <div className="h-10 w-[1px] bg-white/5 mx-2 hidden sm:block"></div>
                                        <span className="text-[10px] font-black text-bn-text-secondary uppercase tracking-widest hidden sm:block opacity-40">Filter</span>
                                        <select className="bg-black/40 border border-white/10 rounded-2xl py-3.5 px-6 text-[10px] font-black uppercase tracking-widest outline-none cursor-pointer focus:border-bn-yellow/50 hover:bg-black/60 transition-all appearance-none pr-10">
                                            <option>All Fields</option>
                                            <option>Store Name</option>
                                            <option>Customer Name</option>
                                        </select>
                                        <i className="fa-solid fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-[8px] text-bn-text-secondary pointer-events-none"></i>
                                    </div>
                                </div>
                            </div>
                        </header>

                        {/* Content Area (Dynamic injection area) */}
                        <div className="flex-1 overflow-y-auto p-8 lg:p-12 custom-scrollbar">
                            <div className="max-w-[1400px] mx-auto">
                                {currentView === 'Broken Product' && <ReportsView type="broken" reports={filteredReports} canManageReports={canManageReports} currentUser={currentUser} onProcess={handleProcess} onShowDetails={setSelectedReport} onDelete={handleDeleteReport} />}
                                {currentView === 'Product Processing' && <ReportsView type="processing" reports={filteredReports} canManageReports={canManageReports} currentUser={currentUser} onStatusChange={handleStatusChange} onShowDetails={setSelectedReport} onDelete={handleDeleteReport} />}
                                {currentView === 'INSPECTED' && <ReportsView type="archive" reports={filteredReports} canManageReports={canManageReports} currentUser={currentUser} onShowDetails={setSelectedReport} onDelete={handleDeleteReport} />}
                                {currentView === 'Monthly Report' && <MonthlyReportView reports={reports} />}
                                {currentView === 'User Management' && <UserManagementView />}
                                {currentView === 'Create Role' && <CreateRoleView />}
                                {currentView === 'Settings' && <div className="py-40 text-center text-bn-text-secondary font-black uppercase tracking-[0.3em] opacity-20 italic">Settings Protocol Offline</div>}
                            </div>
                        </div>
                    </main>

                    {/* Report Details Modal */}
                    <Modal isOpen={!!selectedReport} onClose={() => setSelectedReport(null)} title={<span className="khmer-siemreap">{selectedReport ? selectedReport.productName : 'Record Details'}</span>}>
                        {selectedReport && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 animate-fade-in">
                                <div className="space-y-6">
                                    <div className="p-5 bg-black/40 border border-white/5 rounded-2xl space-y-4">
                                        <div className="flex flex-col"><span className="text-[9px] font-black text-bn-text-secondary uppercase">Unique Identifier</span><span className="text-bn-yellow font-mono font-black">{selectedReport.reportId}</span></div>
                                        <div className="flex flex-col"><span className="text-[9px] font-black text-bn-text-secondary uppercase">Timestamp</span><span className="text-xs font-bold">{new Date(selectedReport.timestamp).toLocaleString()}</span></div>
                                        <div className="flex flex-col">
                                            <span className="text-[9px] font-black text-bn-text-secondary uppercase">Origin Team / Store</span>
                                            <span className="text-xs font-bold text-white uppercase">{selectedReport.teamGroup ? selectedReport.teamGroup.split('-').pop().trim() : 'Unknown Team'} — {selectedReport.teamPage}</span>
                                        </div>
                                        <div className="flex flex-col"><span className="text-[9px] font-black text-bn-text-secondary uppercase">Asset / Product Name</span><span className="text-sm font-black text-bn-yellow uppercase">{selectedReport.productName || 'N/A'}</span></div>
                                        <div className="flex flex-col"><span className="text-[9px] font-black text-bn-text-secondary uppercase">Subject Name</span><span className="text-sm font-black text-white uppercase">{selectedReport.name}</span></div>
                                    </div>
                                    <div className="bg-black/40 border border-white/5 rounded-2xl p-6">
                                        <span className="text-[9px] font-black text-bn-text-secondary uppercase block mb-3 khmer-siemreap">Incident Description</span>
                                        <p className="text-sm text-bn-text-secondary leading-relaxed">{selectedReport.problemDesc}</p>
                                    </div>

                                </div>
                                <div className="space-y-6">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {/* Product Photo */}
                                        <div className="aspect-square bg-black border border-white/5 rounded-3xl overflow-hidden shadow-2xl relative group">
                                            {(selectedReport.photo || selectedReport.customerPhoto) ? 
                                                <img src={selectedReport.photo || selectedReport.customerPhoto} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" /> : 
                                                <div className="w-full h-full flex flex-col items-center justify-center text-bn-text-secondary opacity-30"><i className="fa-solid fa-image text-3xl mb-3"></i><span className="text-[10px] font-black uppercase tracking-widest">No Product Image</span></div>
                                            }
                                            <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-60"></div>
                                            <div className="absolute bottom-4 left-4 flex items-center gap-2">
                                                <div className="w-8 h-8 rounded-xl bg-bn-yellow flex items-center justify-center text-bn-bg shadow-lg"><i className="fa-solid fa-camera text-xs"></i></div>
                                                <span className="text-[9px] font-black text-white uppercase tracking-widest drop-shadow-lg">Product Photo</span>
                                            </div>
                                        </div>

                                        {/* Invoice Photo */}
                                        <div className="aspect-square bg-black border border-white/5 rounded-3xl overflow-hidden shadow-2xl relative group">
                                            {selectedReport.invoice ? 
                                                <img src={selectedReport.invoice} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" /> : 
                                                <div className="w-full h-full flex flex-col items-center justify-center text-bn-text-secondary opacity-30"><i className="fa-solid fa-file-invoice text-3xl mb-3"></i><span className="text-[10px] font-black uppercase tracking-widest">No Invoice Data</span></div>
                                            }
                                            <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-60"></div>
                                            <div className="absolute bottom-4 left-4 flex items-center gap-2">
                                                <div className="w-8 h-8 rounded-xl bg-bn-yellow flex items-center justify-center text-bn-bg shadow-lg"><i className="fa-solid fa-receipt text-xs"></i></div>
                                                <span className="text-[9px] font-black text-white uppercase tracking-widest drop-shadow-lg">Invoice Record</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex gap-4">
                                        <button className="flex-1 bg-white/5 hover:bg-white/10 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all">Export Protocol</button>
                                        <button onClick={() => setSelectedReport(null)} className="flex-1 bg-bn-yellow hover:bg-bn-yellow-hover text-bn-bg py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all shadow-lg">Close Dossier</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </Modal>

                    {/* Sidebar Overlay (Mobile) */}
                    {isSidebarOpen && (
                        <div onClick={() => setIsSidebarOpen(false)} className="fixed inset-0 z-40 bg-black/80 backdrop-blur-md lg:hidden transition-opacity"></div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
    <script>
        // Manually transform and execute the JSX code to bypass tool-side interception
        (function() {
            const script = document.getElementById('main-script');
            if (!script) return;
            
            function run() {
                if (!window.Babel || !window.React || !window.ReactDOM) {
                    setTimeout(run, 100);
                    return;
                }
                try {
                    const transformed = Babel.transform(script.textContent, {
                        presets: [['react', { runtime: 'classic' }]]
                    }).code;
                    const newScript = document.createElement('script');
                    newScript.textContent = transformed;
                    document.body.appendChild(newScript);
                } catch (e) {
                    console.error('Babel Manual Transformation Error:', e);
                }
            }
            
            if (document.readyState === 'loading') {
                window.addEventListener('DOMContentLoaded', run);
            } else {
                run();
            }
        })();
    </script>
</body>
</html>
