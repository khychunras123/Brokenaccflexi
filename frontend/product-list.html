<!DOCTYPE html>
<html class="dark" lang="km">
<head>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Product List & API Check</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Suwannaphum:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = { 
            darkMode: "class", 
            theme: { 
                extend: { 
                    colors: { 
                        "binance-yellow": "#F3BA2F",
                        "binance-bg": "#0B0E11",
                        "binance-card": "#1E2329",
                        "binance-input": "#2B3139",
                        "binance-border": "#474D57",
                        "binance-text": "#EAECEF",
                        "binance-gray": "#929AA5"
                    }
                } 
            } 
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Suwannaphum:wght@400;700;900&family=Moul&display=swap" rel="stylesheet">
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        body { 
            background-color: #0B0E11; 
            color: #EAECEF; 
            min-height: 100vh; 
            font-family: 'Khmer OS Siemreap', 'Manrope', 'Suwannaphum', sans-serif;
        }
        .bn-input {
            background-color: #1E1E1E !important;
            border: 1px solid #2B3139 !important;
            color: #EAECEF !important;
            transition: all 0.2s ease;
        }
        .bn-input:focus {
            border-color: #F3BA2F !important;
            outline: none !important;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0B0E11;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #474D57;
            border-radius: 10px;
        }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script id="main-script" type="text/plain">
        /** @jsx React.createElement */
        /** @jsxFrag React.Fragment */
        const { useState, useEffect, useMemo } = React;

        const formatImageUrl = (url) => {
            if (!url) return null;
            const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
            if (match && match[1]) {
                return 'https://drive.google.com/thumbnail?id=' + match[1] + '&sz=w1000';
            }
            return url;
        };


        const API_URL = '/api/products';
        const API_KEY = 'my-secret-key-ChanRas-123';

        const ProductList = () => {
            const [products, setProducts] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            
            const [isProductsLoaded, setIsProductsLoaded] = useState(false);
            const [isLoadingProducts, setIsLoadingProducts] = useState(true);
            const [apiError, setApiError] = useState(null);
            
            const [apiStatus, setApiStatus] = useState(null);

            const fetchProductsFromAPI = async () => {
                setIsLoadingProducts(true);
                setApiError(null);
                try {
                    const response = await fetch(API_URL, {
                        headers: { 'Content-Type': 'application/json' }
                    });
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const data = await response.json();
                    
                    if (data && data.status === 'success' && Array.isArray(data.data)) {
                        setProducts(data.data);
                        setIsProductsLoaded(true);
                        if (data.data.length === 0) setApiError("No products found.");
                    } else {
                        setProducts([]);
                        setApiError("Invalid data format received.");
                    }
                } catch (err) {
                    console.error("Failed to fetch products", err);
                    setApiError("Unable to connect to server. Please check your internet connection.");
                } finally {
                    setIsLoadingProducts(false);
                }
            };

            const testApiConnection = async () => {
                setApiStatus({ type: 'loading', message: 'Testing connection to Production Server...' });
                const startTime = Date.now();
                try {
                    const response = await fetch(API_URL, {
                        headers: { 'Content-Type': 'application/json' }
                    });
                    const endTime = Date.now();
                    const responseTime = endTime - startTime;
                    
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    
                    if (data && data.status === 'success' && Array.isArray(data.data)) {
                        setProducts(data.data);
                        setIsProductsLoaded(true);
                        setApiStatus({ 
                            type: 'success', 
                            message: `✅ API Connected Successfully`,
                            details: `Response: 200 OK | Items Fetched: ${data.data.length} | Latency: ${responseTime}ms`
                        });
                        setApiError(null);
                    } else {
                        throw new Error('Invalid Data Structure Received');
                    }
                } catch (err) {
                    setApiStatus({ 
                        type: 'error', 
                        message: `❌ API Connection Failed`,
                        details: `Reason: ${err.message}` 
                    });
                }
            };

            useEffect(() => {
                fetchProductsFromAPI();
            }, []);

            const filteredProducts = useMemo(() => {
                if (!searchQuery.trim()) return products;
                const query = searchQuery.toLowerCase().trim();
                return products.filter(product => {
                    const nameMatch = product.ProductName ? String(product.ProductName).toLowerCase().includes(query) : false;
                    const barcodeMatch = product.Barcode ? String(product.Barcode).toLowerCase().includes(query) : false;
                    const tagMatch = product.Tags ? String(product.Tags).toLowerCase().includes(query) : false;
                    return nameMatch || barcodeMatch || tagMatch;
                });
            }, [products, searchQuery]);

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 min-h-screen flex flex-col">
                    <header className="mb-8">
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div className="flex items-center gap-4">
                                <a href="dashboard_one.html" className="w-10 h-10 bg-binance-input hover:bg-[#363C4E] rounded-xl flex items-center justify-center text-white transition-colors border border-white/5">
                                    <span className="material-symbols-outlined text-lg">arrow_back</span>
                                </a>
                                <div>
                                    <h1 className="text-2xl font-bold tracking-tight text-white flex items-center gap-2">
                                        <span className="material-symbols-outlined text-binance-yellow">inventory</span>
                                        Product Catalog
                                    </h1>
                                    <p className="text-xs text-binance-gray mt-1">View and verify items from the live database.</p>
                                </div>
                            </div>
                            
                            <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
                                <div className="relative">
                                    <span className="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-binance-gray text-lg">search</span>
                                    <input 
                                        type="text" 
                                        placeholder="Search by name, barcode..."
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        className="w-full sm:w-72 bn-input pl-10 pr-4 py-2.5 rounded-xl text-sm"
                                    />
                                </div>
                                <button 
                                    onClick={testApiConnection}
                                    className="bg-binance-yellow hover:bg-[#FCD535] text-binance-bg font-bold px-5 py-2.5 rounded-xl flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-lg"
                                >
                                    <span className="material-symbols-outlined text-sm">wifi_find</span>
                                    Check API
                                </button>
                            </div>
                        </div>
                    </header>

                    {apiStatus && (
                        <div className={`mb-6 p-4 rounded-xl text-sm flex items-start sm:items-center justify-between gap-4 border shadow-sm animate-in fade-in slide-in-from-top-4 duration-300 ${apiStatus.type === 'success' ? 'bg-green-500/10 text-green-400 border-green-500/20' : apiStatus.type === 'error' ? 'bg-red-500/10 text-red-400 border-red-500/20' : 'bg-blue-500/10 text-blue-400 border-blue-500/20'}`}>
                            <div className="flex flex-col gap-1">
                                <span className="font-bold">{apiStatus.message}</span>
                                {apiStatus.details && <span className="opacity-80 text-xs font-mono">{apiStatus.details}</span>}
                            </div>
                            <button onClick={() => setApiStatus(null)} className="opacity-50 hover:opacity-100 transition-opacity">
                                <span className="material-symbols-outlined">close</span>
                            </button>
                        </div>
                    )}

                    <div className="flex-grow">
                        {isLoadingProducts ? (
                            <div className="h-64 flex flex-col items-center justify-center space-y-4">
                                <div className="w-12 h-12 border-4 border-binance-yellow border-t-transparent rounded-full animate-spin"></div>
                                <p className="text-sm font-bold text-binance-gray tracking-widest uppercase">Fetching Live Data...</p>
                            </div>
                        ) : apiError ? (
                            <div className="h-64 flex flex-col items-center justify-center space-y-4 bg-red-500/5 rounded-2xl border border-red-500/10">
                                <span className="material-symbols-outlined text-5xl text-red-500/50">cloud_off</span>
                                <p className="text-sm font-bold text-red-400">{apiError}</p>
                                <button onClick={fetchProductsFromAPI} className="mt-2 text-xs text-white bg-red-500/20 hover:bg-red-500/40 px-4 py-2 rounded-lg font-bold">Try Again</button>
                            </div>
                        ) : (
                            <>
                                <div className="mb-4 flex items-center justify-between text-xs text-binance-gray">
                                    <span>Showing <strong className="text-white">{filteredProducts.length}</strong> items</span>
                                    {searchQuery && <span>Filtered by: "<strong className="text-white">{searchQuery}</strong>"</span>}
                                </div>
                                
                                {filteredProducts.length > 0 ? (
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                                        {filteredProducts.map((product, idx) => (
                                            <div key={idx} className="bg-binance-card border border-white/5 hover:border-binance-yellow/30 rounded-2xl p-4 transition-all hover:shadow-xl hover:-translate-y-1 group">
                                                <div className="aspect-video w-full bg-[#0B0E11] rounded-xl mb-4 overflow-hidden relative border border-white/5 flex items-center justify-center group-hover:border-binance-yellow/20 transition-colors">
                                                    {product.ImageURL ? (
                                                        <img 
                                                            src={formatImageUrl(product.ImageURL)} 
                                                            className="w-full h-full object-contain p-2" 
                                                            alt={product.ProductName} 
                                                            onError={(e) => { e.target.onerror = null; e.target.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="%23474D57"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>'; }}
                                                        />
                                                    ) : (
                                                        <span className="material-symbols-outlined text-5xl text-binance-border">image</span>
                                                    )}
                                                    {product.Price && (
                                                        <div className="absolute top-2 right-2 bg-binance-yellow text-binance-bg text-xs font-black px-2 py-1 rounded shadow-lg">
                                                            ${product.Price}
                                                        </div>
                                                    )}
                                                </div>
                                                <h3 className="font-bold text-white text-sm line-clamp-2 mb-2 group-hover:text-binance-yellow transition-colors">{product.ProductName}</h3>
                                                
                                                <div className="space-y-1.5 mb-3">
                                                    <div className="flex items-center justify-between text-xs">
                                                        <span className="text-binance-gray">Barcode</span>
                                                        <span className="font-mono font-medium bg-white/5 px-1.5 py-0.5 rounded text-white">{product.Barcode || 'N/A'}</span>
                                                    </div>
                                                    {product.Cost && (
                                                        <div className="flex items-center justify-between text-xs">
                                                            <span className="text-binance-gray">Cost</span>
                                                            <span className="font-bold text-red-400">${product.Cost}</span>
                                                        </div>
                                                    )}
                                                </div>

                                                {product.Tags && (
                                                    <div className="flex flex-wrap gap-1.5 mt-auto pt-3 border-t border-white/5">
                                                        {product.Tags.split(',').map((tag, i) => (
                                                            <span key={i} className="text-[9px] font-bold bg-[#2B3139] text-gray-300 px-2 py-0.5 rounded-full border border-white/5 uppercase tracking-wider">{tag.trim()}</span>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="py-20 flex flex-col items-center justify-center text-center bg-binance-card/50 rounded-2xl border border-white/5">
                                        <span className="material-symbols-outlined text-6xl text-binance-border mb-4">search_off</span>
                                        <h3 className="text-lg font-bold text-white mb-1">No products found</h3>
                                        <p className="text-sm text-binance-gray">Try adjusting your search query.</p>
                                    </div>
                                )}
                            </>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ProductList />);
    </script>
    <script>
        // Manually transform and execute the JSX code to bypass tool-side interception
        (function() {
            const script = document.getElementById('main-script');
            if (!script) return;
            
            function run() {
                if (!window.Babel || !window.React || !window.ReactDOM) {
                    setTimeout(run, 100);
                    return;
                }
                try {
                    const transformed = Babel.transform(script.textContent, {
                        presets: [['react', { runtime: 'classic' }]]
                    }).code;
                    const newScript = document.createElement('script');
                    newScript.textContent = transformed;
                    document.body.appendChild(newScript);
                } catch (e) {
                    console.error('Babel Manual Transformation Error:', e);
                }
            }
            
            if (document.readyState === 'loading') {
                window.addEventListener('DOMContentLoaded', run);
            } else {
                run();
            }
        })();
    </script>
</body>
</html>
