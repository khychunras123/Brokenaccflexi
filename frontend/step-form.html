<!DOCTYPE html>

<head>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script>
        (function() {
            const originalWarn = console.warn;
            console.warn = function(...args) {
                if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com')) {
                    return;
                }
                originalWarn.apply(console, args);
            };
        })();
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Suwannaphum:wght@400;700;900&family=Moul&display=swap" rel="stylesheet">

    <script id="tailwind-config">
        tailwind.config = { 
            darkMode: "class", 
            theme: { 
                extend: { 
                    colors: { 
                        "binance-yellow": "#F3BA2F",

                    }
                } 
            } 
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        body { 
            background-color: #0B0E11; 
            color: #EAECEF; 
            min-height: 100vh; 
            font-family: 'Khmer OS Siemreap', 'Manrope', 'Suwannaphum', sans-serif;
        }
        .bn-input {
            background-color: #1E1E1E !important;
            border: 1px solid #2B3139 !important;
            color: #EAECEF !important;
            transition: all 0.2s ease;
        }
        .khmer-moul {
            font-family: 'Khmer OS Muol Light', 'Moul', serif !important;
            font-size: 0.9rem !important;
            line-height: 1.8 !important;
        }
        .khmer-siemreap {
            font-family: 'Khmer OS Siemreap', sans-serif !important;
        }
        .bn-input::placeholder {
            color: #9ca3af !important;
            opacity: 1 !important;
        }
        .bn-input:hover { border-color: #F3BA2F !important; }
        .bn-input:focus {
            border-color: #F3BA2F !important;
            outline: none !important;
            background-color: #1E1E1E !important;
        }
        .bn-btn-primary {
            background-color: #F3BA2F;
            color: #1E2329;
            font-weight: 600;
        }
        .bn-btn-primary:hover { background-color: #FCD535; }
        .bn-btn-secondary {
            background-color: #474D57;
            color: #EAECEF;
        }
        .bn-btn-secondary:hover { background-color: #5E6673; }
        
        ::-webkit-calendar-picker-indicator { filter: invert(0.8); cursor: pointer; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }

        @keyframes pulse-yellow {
            0% { box-shadow: 0 0 0 0 rgba(243, 186, 47, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(243, 186, 47, 0); }
            100% { box-shadow: 0 0 0 0 rgba(243, 186, 47, 0); }
        }
        .step-pulse {
            animation: pulse-yellow 2s infinite;
        }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script id="main-script" type="text/plain">
        /** @jsx React.createElement */
        /** @jsxFrag React.Fragment */
        const { useState, useRef, useEffect, useMemo } = React;

        const formatImageUrl = (url) => {
            if (!url) return null;
            const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
            if (match && match[1]) {
                return 'https://drive.google.com/thumbnail?id=' + match[1] + '&sz=w1000';
            }
            return url;
        };


        const teams = [
            { group: "ACC Store - Team Vuthea", stores: ["GA Tech KH", "Nio Tech Store", "CH30 Electronic Store", "CH Smart Accessories"], telegram: "Vuthea" },
            { group: "ACC Store - Team Yanun", stores: ["ACC Store", "ACC Gadgets Store", "AGI Tech Shop", "ENA Smart Tech", "CNo1 Store"], telegram: "Yanun" },
            { group: "ACC Store - Team Chhit", stores: ["ACC Tech Store", "Primer Tech KH", "UR Gadget Store"], telegram: "Chhit" },
            { group: "ACC Store - Team Chhun", stores: ["Tech Perfection KH", "Jade Gear", "INO Tech Studio", "FR Tech Goods", "PVR Smart Gear"], telegram: "Chhun" },
            { group: "ACC Store - Team Leak", stores: ["Gadme Store", "Gathub Tech Store", "GEN2 Gadget", "Gathub Store", "4You Gadget"], telegram: "Leak" },
            { group: "Flexi Gear - Team Heang", stores: ["LUXE Tech Lab", "Besty Tech Store", "Kampu Gadgets", "Kampu Electronic Store"], telegram: "Heang" },
            { group: "Flexi Gear - Team Thol", stores: ["GIG Accessories KH", "Rise Accessories Store", "DK Tech Accessories", "MAGA Gadget Studio", "Gimi Gadget Store"], telegram: "Thol" },
            { group: "Flexi Gear - Team Navy", stores: ["Mean Chey Tech", "SSBD Tech Gadgets"], telegram: "Navy" },
            { group: "Flexi Gear - Team Phyra", stores: ["MC Tech Store", "WP Gadget Shop", "TC5 Store", "KS Accessories Store"], telegram: "Pheara" },
            { group: "Flexi Gear - Team Thoeun", stores: ["TK Smart Accessories", "DEPO Tech Hub", "GatHub Station", "Flexi Gear", "F5 Gadget"], telegram: "Thoeun" }
        ];

        function CameraModal({ onClose, onSave }) {
            const videoRef = useRef(null);
            const [photo, setPhoto] = useState(null);

            useEffect(() => {
                const startCamera = async () => {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                        if (videoRef.current) videoRef.current.srcObject = stream;
                    } catch (e) { alert("បញ្ហាកាមេរ៉ា (Camera Error)"); onClose(); }
                };
                startCamera();
                return () => {
                    if (videoRef.current && videoRef.current.srcObject) {
                        videoRef.current.srcObject.getTracks().forEach(t => t.stop());
                    }
                };
            }, []);

            const capture = () => {
                const canvas = document.createElement('canvas');
                canvas.width = videoRef.current.videoWidth;
                canvas.height = videoRef.current.videoHeight;
                canvas.getContext('2d').drawImage(videoRef.current, 0, 0);
                setPhoto(canvas.toDataURL('image/jpeg', 0.8));
            };

            return (
                <div className="fixed inset-0 z-[200] bg-[#0B0E11] flex flex-col">
                    <div className="flex-grow relative flex items-center justify-center">
                        {!photo ? (
                            <video ref={videoRef} autoPlay playsInline className="w-full h-full object-cover max-lg" />
                        ) : (
                            <img src={photo} className="w-full h-full object-contain max-lg" alt="Captured" />
                        )}
                        <button onClick={onClose} className="absolute top-6 right-6 w-10 h-10 bg-[#2B3139] rounded-full flex items-center justify-center text-[#EAECEF]">
                            <span className="material-symbols-outlined">close</span>
                        </button>
                    </div>
                    <div className="h-40 bg-[#1E2329] flex items-center justify-center gap-10">
                        {!photo ? (
                            <button onClick={capture} className="w-16 h-16 border-4 border-[#F3BA2F] rounded-full flex items-center justify-center">
                                <div className="w-12 h-12 bg-white rounded-full"></div>
                            </button>
                        ) : (
                            <>
                                <button onClick={() => setPhoto(null)} className="bn-btn-secondary px-8 py-3 rounded-md font-bold text-sm khmer-siemreap">ថតសាថ្មី</button>
                                <button onClick={() => onSave(photo)} className="bn-btn-primary px-8 py-3 rounded-md font-bold text-sm khmer-siemreap">យល់ព្រម</button>
                            </>
                        )}
                    </div>
                </div>
            );
        }

        const App = () => {
            const today = new Date().toISOString().split('T')[0];
            const [step, setStep] = useState(1);
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [formData, setFormData] = useState({
                teamGroup: '', teamPage: '', branch: '', name: '', phone: '', 
                purchaseDate: today, productName: '', barcode: '', price: '', receivedDate: today, 
                problemDesc: '', invoice: null, photo: null,
                teamLead: '', telegram: ''
            });

            const [showCamera, setShowCamera] = useState(null);
            const [teamSearch, setTeamSearch] = useState('');
            const [isTeamDropdownOpen, setIsTeamDropdownOpen] = useState(false);
            const [products, setProducts] = useState([]);
            const [isProductDropdownOpen, setIsProductDropdownOpen] = useState(false);
            const [filteredProducts, setFilteredProducts] = useState([]);
            const [isSearchingProducts, setIsSearchingProducts] = useState(false);
            const [selectedProduct, setSelectedProduct] = useState(null);
            
            // New states for API requirement
            const [isProductsLoaded, setIsProductsLoaded] = useState(false);
            const [apiError, setApiError] = useState(null);
            const [apiStatus, setApiStatus] = useState(null); // for test connection
            const [isLoadingProducts, setIsLoadingProducts] = useState(false);

            const fetchProductsFromAPI = async () => {
                if (isProductsLoaded || isLoadingProducts) return;
                setIsLoadingProducts(true);
                setApiError(null);
                try {
                    const response = await fetch('/api/products', {
                        headers: { 'X-API-Key': 'my-secret-key-ChanRas-123' }
                    });
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const data = await response.json();
                    if (data && data.status === 'success' && Array.isArray(data.data)) {
                        setProducts(data.data);
                        setIsProductsLoaded(true);
                        if (data.data.length === 0) setApiError("No products found.");
                    } else {
                        setProducts([]);
                        setApiError("No products found.");
                    }
                } catch (err) {
                    console.error("Failed to fetch products", err);
                    if (!navigator.onLine || err.message.includes('Failed to fetch')) {
                        setApiError("Unable to connect to server. Please check your internet connection.");
                    } else {
                        setApiError("Failed to load products. Please try again later.");
                    }
                } finally {
                    setIsLoadingProducts(false);
                }
            };

            const testApiConnection = async () => {
                setApiStatus({ type: 'loading', message: 'Testing connection...' });
                const startTime = Date.now();
                try {
                    const response = await fetch('/api/products', {
                        headers: { 'X-API-Key': 'my-secret-key-ChanRas-123' }
                    });
                    const endTime = Date.now();
                    const responseTime = endTime - startTime;
                    
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    
                    if (data && data.status === 'success' && Array.isArray(data.data)) {
                        setProducts(data.data); // Update cache
                        setIsProductsLoaded(true);
                        setApiStatus({ 
                            type: 'success', 
                            message: `✅ API Connected Successfully`,
                            details: `Status: 200 OK | Total Products: ${data.data.length} | Response Time: ${responseTime}ms`
                        });
                    } else {
                        throw new Error('Invalid Data Format');
                    }
                } catch (err) {
                    setApiStatus({ 
                        type: 'error', 
                        message: `❌ API Connection Failed`,
                        details: `Error Message: ${err.message}` 
                    });
                }
            };

            useEffect(() => {
                if (step === 1) {
                    fetchProductsFromAPI();
                }
            }, [step]);

            // Robust, case-insensitive client-side filtering
            useEffect(() => {
                const searchTerm = formData.productName;
                if (!searchTerm || searchTerm.length < 1) {
                    setFilteredProducts([]);
                    return;
                }

                // Prevent reopening dropdown if the input exactly matches the selected product
                if (selectedProduct && selectedProduct.ProductName === searchTerm) {
                    return;
                }

                setIsSearchingProducts(true);
                const query = searchTerm.toLowerCase().trim();
                
                const matches = products.filter(product => {
                    const nameMatch = product.ProductName ? String(product.ProductName).toLowerCase().includes(query) : false;
                    const barcodeMatch = product.Barcode ? String(product.Barcode).toLowerCase().includes(query) : false;
                    const tagMatch = product.Tags ? String(product.Tags).toLowerCase().includes(query) : false;
                    return nameMatch || barcodeMatch || tagMatch;
                });

                setFilteredProducts(matches.slice(0, 15)); // Keep UI snappy
                setIsSearchingProducts(false);
            }, [formData.productName, products, selectedProduct]);

            useEffect(() => {
                const captured = localStorage.getItem('capturedPhoto');
                const type = localStorage.getItem('capturedPhotoType');
                if (captured) {
                    if (type === 'customer' || type === 'photo') {
                        setFormData(prev => ({ ...prev, photo: captured }));
                    } else if (type === 'invoice') {
                        setFormData(prev => ({ ...prev, invoice: captured }));
                    }
                    localStorage.removeItem('capturedPhoto');
                    localStorage.removeItem('capturedPhotoType');
                }
            }, []);

            const filteredTeams = useMemo(() => 
                teams.filter(t => t.group.toLowerCase().includes(teamSearch.toLowerCase())), 
            [teamSearch]);

            const isStepValid = useMemo(() => {
                if (step === 1) return formData.productName?.trim() && formData.problemDesc?.trim();
                if (step === 2) return formData.name?.trim() && formData.phone?.trim() && /^[\d\s\-\+]{8,15}$/.test(formData.phone.trim()) && formData.purchaseDate;
                if (step === 3) return formData.teamGroup?.trim() && formData.teamPage?.trim();
                return true;
            }, [step, formData]);

            const handleNext = async () => {
                if (!isStepValid) {
                    if (step === 1) alert("សូមបំពេញឈ្មោះផលិតផល និងបញ្ហាដែលខូច (Please describe the product and the problem)");
                    if (step === 2) alert("សូមបំពេញឈ្មោះ លេខទូរស័ព្ទអោយបានត្រឹមត្រូវ និងថ្ងៃទិញ (Please complete Name, valid Phone, and Date)");
                    if (step === 3) alert("សូមជ្រើសរើស ក្រុម និងផេក (Please select Team and Page)");
                    return;
                }

                if (step === 3) {
                    try {
                        const teamLeadName = formData.teamGroup.split('-').pop().replace('Team', '').trim();
                        const reportData = {
                            ...formData, 
                            reportId: 'AUTO-' + Date.now().toString().slice(-4), 
                            timestamp: new Date().toISOString(),
                            teamLead: teamLeadName,
                            status: 'pending'
                        };

                        const response = await fetch('/api/reports', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(reportData)
                        });

                        if (!response.ok) throw new Error('Failed to send report');

                        setIsSubmitted(true);
                        setTimeout(() => { window.location.href = 'dashboard_one.html'; }, 2000);
                    } catch (err) {
                        console.error('Submission error:', err);
                        alert("ការបញ្ជូនរបាយការណ៍មានបញ្ហា (Submission Error)");
                    }
                    return;
                }
                setStep(step + 1);
            };

            const StepIndicator = () => (
                <div className="flex items-center w-full mb-12 px-2 max-w-sm mx-auto">
                    {[1, 2, 3].map(s => (
                        <React.Fragment key={s}>
                            <div className="flex flex-col items-center">
                                <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm transition-all duration-300 ${step >= s ? 'bg-binance-yellow text-binance-bg' : 'bg-binance-border text-binance-gray'} ${step === s ? 'step-pulse' : ''}`}>
                                    {step > s ? <span className="material-symbols-outlined text-xs">check</span> : s}
                                </div>
                            </div>
                            {s < 3 && <div className={`flex-grow h-[1px] mx-2 ${step > s ? 'bg-binance-yellow' : 'bg-binance-border'}`}></div>}
                        </React.Fragment>
                    ))}
                </div>
            );

            if (isSubmitted) return (
                <div className="min-h-screen bg-binance-bg flex items-center justify-center p-6 text-center">
                    <div className="space-y-6 animate-in fade-in zoom-in duration-500">
                        <span className="material-symbols-outlined text-7xl text-binance-yellow">check_circle</span>
                        <h2 className="text-3xl font-bold khmer-siemreap">កត់ត្រាបានជោគជ័យ</h2>
                        <p className="text-binance-gray italic khmer-siemreap">កំពុងបញ្ជូនទៅកាន់ផ្ទាំងគ្រប់គ្រង...</p>
                        <div className="w-8 h-8 border-2 border-binance-yellow border-t-transparent rounded-full animate-spin mx-auto"></div>
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col pt-10 pb-20 px-6">
                    <header className="mb-10 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-binance-yellow rounded flex items-center justify-center">
                                <span className="material-symbols-outlined text-binance-bg text-xl font-bold">report</span>
                            </div>
                            <h1 className="text-xl font-bold tracking-tight text-white khmer-siemreap">កត់ត្រាអីវ៉ាន់ខូច</h1>
                        </div>
                        <a 
                            href="dashboard_one.html" 
                            className="flex items-center gap-2 px-4 py-2 bg-white/5 hover:bg-white/10 text-binance-gray hover:text-white rounded-xl transition-all border border-white/5 text-sm font-bold group khmer-siemreap"
                        >
                            <span className="material-symbols-outlined text-sm group-hover:-translate-x-1 transition-transform">arrow_back</span>
                            បោះបង់
                        </a>
                    </header>

                    <StepIndicator />

                    <div className="flex-grow space-y-8 animate-in fade-in duration-300">
                        {step === 1 && (
                            <div className="space-y-6 animate-in slide-in-from-bottom-4 duration-500">
                                <h2 className="text-2xl font-bold text-white tracking-tight khmer-siemreap">របាយការណ៍ខូច (Step 1)</h2>
                                <div className="space-y-5">
                                    <div className="bg-[#1c1d24] border border-white/5 rounded-xl p-4">
                                        <div className="flex items-center justify-between mb-3">
                                            <span className="text-xs font-bold text-white uppercase tracking-widest khmer-siemreap">API Connection Test</span>
                                            <button 
                                                onClick={testApiConnection}
                                                className="bg-[#2B3139] hover:bg-[#363C4E] text-xs font-bold text-white px-3 py-1.5 rounded flex items-center gap-1.5 transition-colors khmer-siemreap"
                                                type="button"
                                            >
                                                <span className="material-symbols-outlined text-sm">wifi_find</span>
                                                Test Connection
                                            </button>
                                        </div>
                                        {apiStatus && (
                                            <div className={`p-3 rounded-lg text-xs font-medium flex flex-col gap-1 ${apiStatus.type === 'success' ? 'bg-green-500/10 text-green-400 border border-green-500/20' : apiStatus.type === 'error' ? 'bg-red-500/10 text-red-400 border border-red-500/20' : 'bg-blue-500/10 text-blue-400 border border-blue-500/20'}`}>
                                                <span className="khmer-siemreap">{apiStatus.message}</span>
                                                {apiStatus.details && <span className="opacity-80 text-[10px] font-mono">{apiStatus.details}</span>}
                                                {apiStatus.type === 'error' && (
                                                    <button onClick={testApiConnection} className="mt-2 text-white bg-red-500/20 hover:bg-red-500/40 px-2 py-1 rounded w-fit text-[10px] khmer-siemreap">Retry</button>
                                                )}
                                            </div>
                                        )}
                                    </div>

                                    <div className="group relative z-50">
                                        <label className="text-xs font-bold text-binance-gray block mb-1.5 uppercase tracking-widest khmer-siemreap">ស្វែងរកផលិតផល (Search Product)</label>
                                        {!selectedProduct ? (
                                        <>
                                        <div className="relative flex bg-[#0B0E11] border border-[#FACC15]/40 focus-within:border-[#FACC15] rounded-xl overflow-hidden transition-colors shadow-inner">
                                            <div className="bg-[#1c1d24] w-14 flex items-center justify-center border-r border-white/5 flex-shrink-0">
                                                {isLoadingProducts ? (
                                                    <div className="w-5 h-5 border-2 border-binance-yellow border-t-transparent rounded-full animate-spin"></div>
                                                ) : (
                                                    <span className="material-symbols-outlined text-gray-500 text-xl font-light">search</span>
                                                )}
                                            </div>
                                            <input 
                                                type="text" 
                                                placeholder="Search product name, barcode or tags..." 
                                                className="w-full bg-transparent p-4 font-medium text-white outline-none placeholder:text-gray-500 khmer-siemreap" 
                                                value={formData.productName} 
                                                onChange={(e) => {
                                                    setFormData({...formData, productName: e.target.value});
                                                    setIsProductDropdownOpen(true);
                                                }}
                                                onFocus={() => setIsProductDropdownOpen(true)}
                                                onBlur={() => setTimeout(() => setIsProductDropdownOpen(false), 200)}
                                            />
                                        </div>
                                        {apiError && (
                                            <div className="mt-2 text-xs text-red-400 flex items-center gap-1.5 khmer-siemreap">
                                                <span className="material-symbols-outlined text-sm">error</span>
                                                {apiError}
                                            </div>
                                        )}
                                        {isProductDropdownOpen && (
                                            <div className="absolute z-[100] w-full mt-2 bg-[#16171d] border border-white/10 rounded-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in-95 duration-200">
                                                <div className="flex justify-between items-center px-5 py-3 border-b border-white/5 bg-[#1c1d24]">
                                                    <span className="text-[10px] font-black text-gray-500 uppercase tracking-widest khmer-siemreap">RESULTS ({filteredProducts.length})</span>
                                                    <div className="flex items-center gap-1.5">
                                                        <div className="w-1.5 h-1.5 rounded-full bg-[#FACC15]"></div>
                                                        <span className="text-[9px] font-black text-[#FACC15]/80 uppercase tracking-[0.2em] khmer-siemreap">ACTIVE</span>
                                                    </div>
                                                </div>
                                                <div className="max-h-60 overflow-y-auto scrollbar-hide">
                                                    {filteredProducts.length > 0 ? (
                                                        filteredProducts.map((p, idx) => (
                                                                <div 
                                                                    key={idx}
                                                                    className="px-5 py-3.5 text-sm text-gray-300 hover:bg-[#1c1d24] hover:text-white cursor-pointer transition-all flex items-center gap-3 border-b border-white/5 last:border-0"
                                                                    onMouseDown={() => {
                                                                        setSelectedProduct(p);
                                                                        setFormData({...formData, productName: p.ProductName, barcode: p.Barcode, price: p.Price});
                                                                        setIsProductDropdownOpen(false);
                                                                    }}
                                                                >
                                                                    <div className="w-12 h-12 bg-black/50 rounded-lg overflow-hidden flex-shrink-0 border border-white/5 flex items-center justify-center">
                                                                        {p.ImageURL ? (

    </script>
    <script>
        // Manually transform and execute the JSX code to bypass tool-side interception
        (function() {
            const script = document.getElementById('main-script');
            if (!script) return;
            
            function run() {
                if (!window.Babel || !window.React || !window.ReactDOM) {
                    setTimeout(run, 100);
                    return;
                }
                try {
                    const transformed = Babel.transform(script.textContent, {
                        presets: [['react', { runtime: 'classic' }]]
                    }).code;
                    const newScript = document.createElement('script');
                    newScript.textContent = transformed;
                    document.body.appendChild(newScript);
                } catch (e) {
                    console.error('Babel Manual Transformation Error:', e);
                }
            }
            
            if (document.readyState === 'loading') {
                window.addEventListener('DOMContentLoaded', run);
            } else {
                run();
            }
        })();
    </script>
